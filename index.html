<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scale=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ELEMENTAL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
button{background:none;border:none;font:inherit;color:inherit;cursor:pointer}
html,body{background:#000;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;
  user-select:none;-webkit-user-select:none;touch-action:none;-webkit-touch-callout:none;
  position:fixed;width:100%;height:100%}
canvas{display:block;position:fixed;top:0;left:0}

/* HUD */
.hud{position:fixed;z-index:20;pointer-events:none}
#hud-score{top:max(8px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  text-align:center;color:#fff;font-weight:800;font-size:20px;text-shadow:0 2px 8px rgba(0,0,0,0.7);letter-spacing:2px}
#hud-wave{top:max(32px,calc(env(safe-area-inset-top)+24px));left:50%;transform:translateX(-50%);
  color:#999;font-size:10px;letter-spacing:3px;text-transform:uppercase}
#hud-combo{top:max(46px,calc(env(safe-area-inset-top)+38px));left:50%;transform:translateX(-50%);
  color:#f59e0b;font-weight:800;font-size:14px;opacity:0;transition:opacity 0.2s}
#hud-combo.show{opacity:1}

#hp-wrap{top:max(58px,calc(env(safe-area-inset-top)+50px));left:50%;transform:translateX(-50%);width:120px}
#hp-bg{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
#hp-fill{height:100%;width:100%;border-radius:3px;background:linear-gradient(90deg,#22c55e,#16a34a);transition:width 0.2s}
#hp-txt{text-align:center;color:#555;font-size:8px;margin-top:1px}

#av-wrap{top:max(74px,calc(env(safe-area-inset-top)+66px));left:50%;transform:translateX(-50%);width:80px}
#av-bg{width:100%;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
#av-fill{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,#ff5533,#33aaff,#44aa33,#ccddee);transition:width 0.15s}
#av-txt{text-align:center;color:#444;font-size:7px;margin-top:1px;letter-spacing:1px}

/* Controls - all fixed at bottom */
.ctrl{position:fixed;z-index:30}

/* Joystick zones */
.joy-zone{position:fixed;bottom:0;height:50%;z-index:15}
#joy-l{left:0;width:50%}
#joy-r{right:0;width:50%}

/* Element bar */
#el-bar{bottom:max(10px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  display:flex;gap:6px;z-index:30;position:fixed}
.el-btn{width:40px;height:40px;border-radius:50%;border:2.5px solid #222;background:rgba(0,0,0,0.6);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;
  -webkit-tap-highlight-color:transparent;transition:all 0.12s}
.el-btn.active{transform:scale(1.15);background:rgba(255,255,255,0.08)}

/* Ability buttons */
#ab1-btn,#ab2-btn{position:fixed;z-index:30;width:48px;height:48px;border-radius:12px;
  border:2px solid #333;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:#888;letter-spacing:0.5px;
  -webkit-tap-highlight-color:transparent;transition:all 0.12s}
#ab1-btn{bottom:max(58px,calc(env(safe-area-inset-bottom)+50px));left:max(12px,env(safe-area-inset-left))}
#ab2-btn{bottom:max(58px,calc(env(safe-area-inset-bottom)+50px));left:max(66px,calc(env(safe-area-inset-left)+54px))}
.ab-ready{border-color:#666!important;color:#ccc!important}
.ab-ready:active{transform:scale(0.9)}

/* Dash + Avatar */
#btn-dash{position:fixed;z-index:30;bottom:max(112px,calc(env(safe-area-inset-bottom)+104px));
  right:max(12px,env(safe-area-inset-right));width:44px;height:44px;border-radius:50%;
  border:2px solid #4af;background:rgba(0,0,0,0.6);color:#4af;font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:all 0.12s}
#btn-dash.cd{border-color:#222;color:#333}

#btn-ava{position:fixed;z-index:30;bottom:max(58px,calc(env(safe-area-inset-bottom)+50px));
  right:max(12px,env(safe-area-inset-right));width:48px;height:48px;border-radius:50%;
  border:2px solid #333;background:rgba(0,0,0,0.65);color:#555;font-size:8px;font-weight:800;
  display:flex;align-items:center;justify-content:center;letter-spacing:0.5px;
  -webkit-tap-highlight-color:transparent;transition:all 0.15s}
#btn-ava.ready{border-color:#ddd;color:#fff;animation:ava-glow 1.2s infinite}
@keyframes ava-glow{0%,100%{box-shadow:0 0 6px rgba(255,255,255,0.2)}50%{box-shadow:0 0 18px rgba(255,255,255,0.5)}}

/* Overlays */
.ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:20px;
  touch-action:manipulation}
.ov h1{font-size:clamp(32px,9vw,64px);font-weight:900;letter-spacing:6px;text-transform:uppercase;margin-bottom:4px}
.ov .sub{color:#555;font-size:clamp(10px,2.5vw,13px);letter-spacing:4px;text-transform:uppercase;margin-bottom:24px}
.ov .stats{color:#999;font-size:13px;margin-bottom:16px;line-height:2.2;text-align:center}
.ov .stats b{color:#fff}
.btn{display:inline-block;padding:12px 32px;margin:5px;font-family:inherit;font-size:14px;font-weight:700;
  color:#fff;background:rgba(255,255,255,0.05);border:2px solid #3a3a3a;border-radius:8px;
  cursor:pointer;letter-spacing:2px;text-transform:uppercase;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;transition:all 0.15s}
.btn:active{transform:scale(0.95)}
.btn.primary{border-color:#f59e0b;color:#f59e0b}

/* Upgrade cards */
#up-ov{display:none;z-index:110}
#up-ov h2{color:#f59e0b;font-size:16px;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
#up-ov .up-sub{color:#555;font-size:10px;margin-bottom:16px}
#up-cards{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:500px}
.up-card{width:150px;padding:12px;background:rgba(255,255,255,0.03);border:2px solid #222;
  border-radius:10px;cursor:pointer;text-align:center;transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
.up-card:active{transform:scale(0.96)}
.up-card .up-icon{font-size:24px;margin-bottom:5px}
.up-card .up-name{font-size:11px;font-weight:700;color:#fff;margin-bottom:2px}
.up-card .up-desc{font-size:9px;color:#777;line-height:1.3}

/* Wave announce */
#wave-ann{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:30;
  pointer-events:none;text-align:center;opacity:0;transition:opacity 0.4s}
#wave-ann .wn{font-size:clamp(48px,14vw,80px);font-weight:900;color:#fff;text-shadow:0 0 30px rgba(255,255,255,0.2)}
#wave-ann .wl{font-size:12px;color:#666;letter-spacing:6px;text-transform:uppercase}

/* Hide in menu */
body.in-menu .hud,body.in-menu .ctrl,body.in-menu #el-bar,
body.in-menu #ab1-btn,body.in-menu #ab2-btn,body.in-menu #btn-dash,
body.in-menu #btn-ava,body.in-menu #wave-ann{display:none!important}
</style>
</head>
<body class="in-menu">

<!-- HUD -->
<div class="hud" id="hud-score">0</div>
<div class="hud" id="hud-wave">WAVE 1</div>
<div class="hud" id="hud-combo">COMBO x2</div>
<div class="hud" id="hp-wrap"><div id="hp-bg"><div id="hp-fill"></div></div><div id="hp-txt">100/100</div></div>
<div class="hud" id="av-wrap"><div id="av-bg"><div id="av-fill"></div></div><div id="av-txt">AVATAR STATE</div></div>

<!-- Controls -->
<div class="joy-zone" id="joy-l"></div>
<div class="joy-zone" id="joy-r"></div>
<div id="el-bar">
  <div class="el-btn active" data-el="fire" id="el-fire" style="border-color:#ff5533">&#x1F525;</div>
  <div class="el-btn" data-el="water" id="el-water">&#x1F4A7;</div>
  <div class="el-btn" data-el="earth" id="el-earth">&#x1FAA8;</div>
  <div class="el-btn" data-el="air" id="el-air">&#x1F32A;</div>
</div>
<button id="ab1-btn" class="ab-ready">AB1</button>
<button id="ab2-btn" class="ab-ready">AB2</button>
<button id="btn-dash">DASH</button>
<button id="btn-ava">0%</button>
<div id="wave-ann"><div class="wl">WAVE</div><div class="wn" id="wave-num">1</div></div>

<!-- Upgrade overlay -->
<div class="ov" id="up-ov"><h2>CHOOSE A BLESSING</h2><div class="up-sub">Select one</div><div id="up-cards"></div></div>

<!-- Title -->
<div class="ov" id="title-scr">
  <h1 style="background:linear-gradient(135deg,#ff5533,#33aaff,#44aa33,#ccddee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">ELEMENTAL</h1>
  <div class="sub">Master of All Elements</div>
  <div id="hs-disp" style="color:#f59e0b;font-size:11px;margin-bottom:12px;display:none"></div>
  <button class="btn primary" id="btn-play" onclick="startGame()">BEGIN</button>
</div>

<!-- Death -->
<div class="ov" id="death-scr" style="display:none">
  <h1 style="color:#ef4444;font-size:clamp(28px,8vw,48px)">FALLEN</h1>
  <div class="sub" style="color:#444">The elements have abandoned you</div>
  <div class="stats" id="death-stats"></div>
  <button class="btn primary" onclick="startGame()">RISE AGAIN</button>
  <button class="btn" onclick="document.getElementById('death-scr').style.display='none';document.getElementById('title-scr').style.display='flex';document.body.classList.add('in-menu')">MENU</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ================================================================
//  SETUP
// ================================================================
const isMob = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) && 'ontouchstart' in window;
let W = innerWidth, H = innerHeight;

// Three.js
const renderer = new THREE.WebGLRenderer({ antialias: !isMob, alpha: false });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x080810);
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x080810, 30, 70);

const camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 200);
camera.position.set(0, 28, 16);
camera.lookAt(0, 0, 0);

window.addEventListener('resize', () => {
  W = innerWidth; H = innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

// Lights
const ambLight = new THREE.HemisphereLight(0x222244, 0x111111, 0.6);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.3);
dirLight.position.set(5, 20, 10);
scene.add(dirLight);
const playerLight = new THREE.PointLight(0xff5533, 1.5, 20);
playerLight.position.set(0, 2, 0);
scene.add(playerLight);

// ================================================================
//  CONSTANTS & UTILS
// ================================================================
const PI2 = Math.PI * 2, PI = Math.PI;
const ARENA_W = 50, ARENA_H = 38;
function rnd(a, b) { return a + Math.random() * (b - a); }
function dist2(a, b) { return (a.x-b.x)**2 + (a.z-b.z)**2; }
function dist(a, b) { return Math.sqrt(dist2(a, b)); }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function angleTo(a, b) { return Math.atan2(b.z - a.z, b.x - a.x); }
function lerpA(a, b, t) { return a + (b - a) * t; }
function v3(x, y, z) { return new THREE.Vector3(x, y, z); }

// Reusable geometries & materials
const sphereGeo = new THREE.SphereGeometry(1, 12, 8);
const boxGeo = new THREE.BoxGeometry(1, 1, 1);
const cylGeo = new THREE.CylinderGeometry(1, 1, 1, 12);
const coneGeo = new THREE.ConeGeometry(1, 2, 8);
const planeGeo = new THREE.PlaneGeometry(1, 1);

function makeMat(color, emissive, emissiveIntensity) {
  return new THREE.MeshStandardMaterial({
    color, emissive: emissive || 0x000000,
    emissiveIntensity: emissiveIntensity || 0,
    roughness: 0.7, metalness: 0.2,
  });
}

// ================================================================
//  ELEMENT DATA
// ================================================================
const EL = {
  fire:  { name:'Fire',  hex:0xff5533, css:'#ff5533', dmg:18, rate:12, spd:0.6, sz:0.15, pierce:0, kb:0.15, burn:90, ab1:{name:'Flame Arc',cd:240}, ab2:{name:'Blaze Dash',cd:360} },
  water: { name:'Water', hex:0x33aaff, css:'#33aaff', dmg:13, rate:10, spd:0.55, sz:0.12, pierce:1, kb:0.08, homing:0.01, ab1:{name:'Ice Burst',cd:300}, ab2:{name:'Heal Tide',cd:480} },
  earth: { name:'Earth', hex:0x77aa33, css:'#77aa33', dmg:38, rate:28, spd:0.4, sz:0.25, pierce:0, kb:0.3, explosive:true, ab1:{name:'Rock Wall',cd:360}, ab2:{name:'Quake Slam',cd:540} },
  air:   { name:'Air',   hex:0xbbccee, css:'#bbccee', dmg:9,  rate:7,  spd:0.75, sz:0.18, pierce:3, kb:0.2, ab1:{name:'Wind Shield',cd:360}, ab2:{name:'Tornado',cd:420} },
};
const EL_KEYS = ['fire','water','earth','air'];

// ================================================================
//  ENEMY DATA
// ================================================================
const EN = {
  grunt:   { hp:35,  spd:0.06, dmg:10, xp:10, color:0xcc4444, sz:0.4, ai:'chase' },
  archer:  { hp:25,  spd:0.04, dmg:12, xp:15, color:0xcc8844, sz:0.35, ai:'ranged', range:12, rate:80 },
  shielder:{ hp:80,  spd:0.035,dmg:15, xp:20, color:0x7788aa, sz:0.5, ai:'shield' },
  charger: { hp:70,  spd:0.03, dmg:25, xp:25, color:0xaa4444, sz:0.55, ai:'charge', chSpd:0.25, chRange:10 },
  bender:  { hp:60,  spd:0.045,dmg:15, xp:30, color:0xff6633, sz:0.4, ai:'ranged', range:11, rate:70 },
  mech:    { hp:200, spd:0.025,dmg:20, xp:50, color:0x888899, sz:0.7, ai:'ranged', range:14, rate:80, noKB:true },
};

// ================================================================
//  UPGRADE DATA
// ================================================================
const UPGRADES = [
  { id:'comb',  name:'Combustion',    icon:'\u{1F4A5}', desc:'Fireballs explode',           color:'#ff5533', fx:{fireExplode:true} },
  { id:'healW', name:'Healing Waters',icon:'\u{1F49A}', desc:'Water hits heal 1 HP',         color:'#33aaff', fx:{waterHeal:1} },
  { id:'meteor',name:'Meteor Strike', icon:'\u2604',    desc:'+50% blast radius',            color:'#77aa33', fx:{bigBlast:0.5} },
  { id:'rapid', name:'Rapid Fire',    icon:'\u26A1',    desc:'+20% attack speed',            color:'#ff8844', fx:{atkSpd:0.2} },
  { id:'big',   name:'Giant Force',   icon:'\u{1F4AA}', desc:'+35% projectile size',         color:'#ffaa44', fx:{projSz:0.35} },
  { id:'swift', name:'Swift Feet',    icon:'\u{1F45F}', desc:'+20% move speed',              color:'#66ff88', fx:{moveSpd:0.2} },
  { id:'regen', name:'Regeneration',  icon:'\u2764',    desc:'Heal 1.5 HP/sec',              color:'#44dd44', fx:{regen:1.5} },
  { id:'fort',  name:'Fortify',       icon:'\u{1F6E1}', desc:'+30 max HP',                   color:'#aaa',    fx:{maxHp:30} },
  { id:'avGr',  name:"Avatar's Grace",icon:'\u2728',    desc:'Avatar charges 40% faster',    color:'#e8e8ff', fx:{avRate:0.4} },
  { id:'vamp',  name:'Vampiric',      icon:'\u{1F9DB}', desc:'Heal 3 HP per kill',           color:'#cc3344', fx:{vamp:3} },
  { id:'allD',  name:'Elementalist',  icon:'\u{1F30A}', desc:'+15% all damage',              color:'#dd88ff', fx:{allDmg:0.15} },
  { id:'prc',   name:'Piercing',      icon:'\u{1F3AF}', desc:'+1 pierce',                    color:'#ff4488', fx:{pierce:1} },
  { id:'dburst',name:'Death Burst',   icon:'\u{1F4AB}', desc:'Kills explode',                color:'#ffaa00', fx:{deathBurst:true} },
  { id:'thick', name:'Thick Skin',    icon:'\u{1F9CA}', desc:'-15% damage taken',            color:'#6688aa', fx:{dmgReduce:0.15} },
];

// ================================================================
//  GAME STATE
// ================================================================
var state = 'menu';
var P, cam3 = { x:0, z:0 };
var enemies, projs, eProjs, particles3, walls3, tornadoes;
var score, kills, wave, wTimer, eLeft, eSpawned, eTotal;
var combo, comboT, comboMax, hitstop;
var perks, avCharge, avActive, avTimer;
var cooldowns, ticks;
var highScore = +localStorage.getItem('el_hs') || 0;

// 3D object pools
var playerMesh, playerGlow, playerDir;
var enemyMeshes = [];
var projMeshes = [];
var eProjMeshes = [];
var particleMeshes = [];
var wallMeshes = [];
var tornadoMeshes = [];
var groundMesh, gridHelper;
var pillars3 = [];

// ================================================================
//  3D SCENE SETUP
// ================================================================
function buildArena() {
  // Ground
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x111118, roughness: 0.9, metalness: 0.1 });
  groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(ARENA_W, ARENA_H), groundMat);
  groundMesh.rotation.x = -PI / 2;
  groundMesh.position.y = -0.01;
  scene.add(groundMesh);

  // Grid
  gridHelper = new THREE.GridHelper(Math.max(ARENA_W, ARENA_H), 40, 0x1a1a22, 0x1a1a22);
  gridHelper.position.y = 0;
  scene.add(gridHelper);

  // Border walls (thin boxes)
  const wallMat = makeMat(0x331111, 0xff3333, 0.1);
  const bw = 0.3;
  [
    [0, 0.5, -ARENA_H/2, ARENA_W, 1, bw],
    [0, 0.5, ARENA_H/2, ARENA_W, 1, bw],
    [-ARENA_W/2, 0.5, 0, bw, 1, ARENA_H],
    [ARENA_W/2, 0.5, 0, bw, 1, ARENA_H],
  ].forEach(([x,y,z,w,h,d]) => {
    const m = new THREE.Mesh(boxGeo, wallMat);
    m.scale.set(w, h, d); m.position.set(x, y, z);
    scene.add(m);
  });

  // Pillars
  pillars3.forEach(p => scene.remove(p.mesh));
  pillars3 = [];
  for (let i = 0; i < 8; i++) {
    const px = rnd(-ARENA_W/2+3, ARENA_W/2-3);
    const pz = rnd(-ARENA_H/2+3, ARENA_H/2-3);
    const pr = rnd(0.5, 1.0);
    const ph = rnd(1.5, 3);
    const mat = makeMat(0x222233, 0x111122, 0.05);
    const mesh = new THREE.Mesh(cylGeo, mat);
    mesh.scale.set(pr, ph, pr);
    mesh.position.set(px, ph/2, pz);
    scene.add(mesh);
    pillars3.push({ x: px, z: pz, r: pr, mesh });
  }
}

function buildPlayer() {
  if (playerMesh) { scene.remove(playerMesh); scene.remove(playerGlow); scene.remove(playerDir); }
  // Body
  const mat = makeMat(0xcccccc, 0xff5533, 0.3);
  playerMesh = new THREE.Mesh(sphereGeo, mat);
  playerMesh.scale.set(0.5, 0.5, 0.5);
  playerMesh.position.y = 0.5;
  scene.add(playerMesh);
  // Glow ring
  const ringGeo = new THREE.TorusGeometry(0.7, 0.05, 8, 24);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xff5533, transparent: true, opacity: 0.4 });
  playerGlow = new THREE.Mesh(ringGeo, ringMat);
  playerGlow.rotation.x = -PI / 2;
  playerGlow.position.y = 0.05;
  scene.add(playerGlow);
  // Direction indicator
  const dirMat = new THREE.MeshBasicMaterial({ color: 0xff5533 });
  playerDir = new THREE.Mesh(coneGeo, dirMat);
  playerDir.scale.set(0.15, 0.3, 0.15);
  playerDir.rotation.z = -PI / 2;
  playerDir.position.y = 0.5;
  scene.add(playerDir);
}

// ================================================================
//  PERK HELPERS
// ================================================================
function perkVal(key) {
  var v = 0;
  for (var i = 0; i < perks.length; i++) {
    var fx = perks[i].fx;
    if (fx[key] !== undefined) { if (typeof fx[key] === 'boolean') return true; v += fx[key]; }
  }
  return v;
}
function playerSpd() {
  var s = 0.12 * (1 + perkVal('moveSpd'));
  if (P.el === 'air') s *= 1.25;
  return s;
}

// ================================================================
//  INIT GAME
// ================================================================
function initGame() {
  P = {
    x: 0, z: 0, angle: 0, firing: false,
    hp: 100, maxHp: 100, el: 'fire',
    fireCd: 0, dashCd: 0, dashing: false, dashT: 0, dashA: 0,
    inv: 0, dmgFlash: 0, alive: true,
    blazeDashT: 0, blazeDashA: 0,
    windShieldT: 0,
  };
  enemies = []; projs = []; eProjs = []; particles3 = []; walls3 = []; tornadoes = [];
  score = 0; kills = 0; wave = 0; wTimer = 0; eLeft = 0; eSpawned = 0; eTotal = 0;
  combo = 0; comboT = 0; comboMax = 0; hitstop = 0;
  perks = []; avCharge = 0; avActive = false; avTimer = 0;
  cooldowns = {}; ticks = 0;
  EL_KEYS.forEach(e => { cooldowns[e+'_1'] = 0; cooldowns[e+'_2'] = 0; });

  // Clear old 3D objects
  enemyMeshes.forEach(m => scene.remove(m)); enemyMeshes = [];
  projMeshes.forEach(m => scene.remove(m)); projMeshes = [];
  eProjMeshes.forEach(m => scene.remove(m)); eProjMeshes = [];
  particleMeshes.forEach(m => scene.remove(m)); particleMeshes = [];
  wallMeshes.forEach(m => scene.remove(m)); wallMeshes = [];
  tornadoMeshes.forEach(m => scene.remove(m)); tornadoMeshes = [];

  buildArena();
  buildPlayer();
  updateElUI();
  nextWave();
}

function updateElUI() {
  var el = EL[P.el];
  document.querySelectorAll('.el-btn').forEach(b => { b.classList.remove('active'); b.style.borderColor = '#222'; });
  var btn = document.getElementById('el-' + P.el);
  if (btn) { btn.classList.add('active'); btn.style.borderColor = el.css; }
  document.getElementById('ab1-btn').textContent = el.ab1.name.split(' ').map(w => w[0]).join('');
  document.getElementById('ab2-btn').textContent = el.ab2.name.split(' ').map(w => w[0]).join('');
  // Update player materials
  if (playerMesh) {
    playerMesh.material.emissive.setHex(el.hex);
    playerGlow.material.color.setHex(el.hex);
    playerDir.material.color.setHex(el.hex);
    playerLight.color.setHex(el.hex);
  }
}

// ================================================================
//  WAVE SYSTEM
// ================================================================
function nextWave() {
  wave++;
  eTotal = 6 + wave * 3 + Math.floor(wave * wave * 0.12);
  eLeft = eTotal; eSpawned = 0; wTimer = 0;
  state = 'waveIntro';
  document.getElementById('wave-num').textContent = wave;
  var ann = document.getElementById('wave-ann');
  ann.style.opacity = '1';
  setTimeout(() => { ann.style.opacity = '0'; }, 1000);
  setTimeout(() => { if (state === 'waveIntro') state = 'playing'; }, 1200);
}

function wavePool() {
  var pool = ['grunt'];
  if (wave >= 2) pool.push('archer');
  if (wave >= 3) pool.push('shielder');
  if (wave >= 4) pool.push('charger');
  if (wave >= 6) pool.push('bender');
  if (wave >= 9) pool.push('mech');
  return pool;
}

function spawnEnemy() {
  var pool = wavePool();
  var type = pool[Math.floor(Math.random() * pool.length)];
  var def = EN[type];
  var hpM = 1 + (wave - 1) * 0.12;
  // Spawn on edge
  var side = Math.floor(Math.random() * 4);
  var sx, sz;
  if (side === 0) { sx = rnd(-ARENA_W/2+2, ARENA_W/2-2); sz = -ARENA_H/2 + 1; }
  else if (side === 1) { sx = rnd(-ARENA_W/2+2, ARENA_W/2-2); sz = ARENA_H/2 - 1; }
  else if (side === 2) { sx = -ARENA_W/2 + 1; sz = rnd(-ARENA_H/2+2, ARENA_H/2-2); }
  else { sx = ARENA_W/2 - 1; sz = rnd(-ARENA_H/2+2, ARENA_H/2-2); }

  var isElite = wave % 5 === 0 && eSpawned === 0;
  var hp = Math.floor(def.hp * hpM * (isElite ? 3 : 1));
  var e = {
    x: sx, z: sz, vx: 0, vz: 0, type: type,
    r: def.sz * (isElite ? 1.3 : 1),
    hp: hp, maxHp: hp,
    spd: def.spd + wave * 0.001,
    dmg: Math.floor(def.dmg * (1 + (wave-1)*0.08) * (isElite ? 1.5 : 1)),
    atkCd: 0, flash: 0, stun: 0, burn: 0, freeze: 0,
    alive: true, elite: isElite, phase: rnd(0, PI2),
    charging: false, chargeT: 0, chargeA: 0, chargeW: 0,
    mesh: null,
  };

  // Create 3D mesh
  var color = isElite ? 0xffdd00 : def.color;
  var mat = makeMat(color, color, 0.2);
  var geo = type === 'mech' ? boxGeo : (type === 'charger' ? coneGeo : sphereGeo);
  e.mesh = new THREE.Mesh(geo, mat);
  e.mesh.scale.set(e.r, e.r, e.r);
  if (type === 'charger') e.mesh.rotation.z = -PI/2;
  e.mesh.position.set(sx, e.r, sz);
  scene.add(e.mesh);
  enemyMeshes.push(e.mesh);

  enemies.push(e);
  eSpawned++;
}

// ================================================================
//  PARTICLES (3D)
// ================================================================
function spark3(x, y, z, vx, vy, vz, color, sz, life) {
  if (particles3.length > 300) return;
  var mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 });
  var mesh = new THREE.Mesh(sphereGeo, mat);
  mesh.scale.set(sz, sz, sz);
  mesh.position.set(x, y, z);
  scene.add(mesh);
  particleMeshes.push(mesh);
  particles3.push({ mesh, vx, vy, vz, life, maxLife: life });
}

function sparkBurst3(x, z, color, count, spd, sz, life) {
  for (var i = 0; i < count; i++) {
    var a = rnd(0, PI2), s = rnd(spd*0.3, spd);
    spark3(x, rnd(0.2,1), z, Math.cos(a)*s, rnd(0.02,0.08), Math.sin(a)*s, color, rnd(sz*0.5,sz), rnd(life*0.6,life));
  }
}

// ================================================================
//  COMBAT
// ================================================================
function firePrimary() {
  var el = EL[P.el];
  var spdMul = 1 + perkVal('atkSpd');
  if (P.fireCd > 0) return;
  P.fireCd = Math.floor(el.rate / spdMul);

  var szMul = 1 + perkVal('projSz');
  var piercePlus = perkVal('pierce') || 0;
  var a = P.angle + rnd(-0.06, 0.06);
  var dmg = Math.floor(el.dmg * (1 + perkVal('allDmg')));
  if (avActive) dmg = Math.floor(dmg * 1.8);

  var ox = P.x + Math.cos(a) * 0.8;
  var oz = P.z + Math.sin(a) * 0.8;

  var color = el.hex;
  var mat = new THREE.MeshBasicMaterial({ color: color });
  var mesh = new THREE.Mesh(sphereGeo, mat);
  var sz = el.sz * szMul;
  mesh.scale.set(sz, sz, sz);
  mesh.position.set(ox, 0.5, oz);
  scene.add(mesh);
  projMeshes.push(mesh);

  projs.push({
    x: ox, z: oz, vx: Math.cos(a)*el.spd, vz: Math.sin(a)*el.spd,
    r: sz, dmg: dmg, el: P.el, mesh: mesh,
    life: 80, pierce: el.pierce + piercePlus, pierced: [],
    kb: el.kb, explosive: el.explosive || perkVal('fireExplode'),
    explosionR: 2.5 * (1 + perkVal('bigBlast')),
    homing: el.homing || 0, burn: el.burn || 0,
  });

  sparkBurst3(ox, oz, color, 3, 0.05, 0.06, 8);
}

function damageEnemy(e, dmg, elKey) {
  e.hp -= dmg; e.flash = 6;
  hitstop = Math.min(hitstop + 1, 3);
  sparkBurst3(e.x, e.z, EL[elKey].hex, 3, 0.04, 0.06, 8);
  if (elKey === 'fire') e.burn = Math.max(e.burn, 90);
  if (perkVal('waterHeal') && elKey === 'water') P.hp = Math.min(P.maxHp, P.hp + perkVal('waterHeal'));
  avCharge = Math.min(100, avCharge + dmg * 0.1 * (1 + perkVal('avRate')));
  comboT = 90; combo++; comboMax = Math.max(comboMax, combo);
  if (e.hp <= 0 && e.alive) killEnemy(e, elKey);
}

function killEnemy(e, elKey) {
  e.alive = false; kills++; eLeft--;
  var def = EN[e.type];
  var pts = Math.floor(def.xp * (1 + Math.min(combo*0.1,3)) * (e.elite?5:1));
  score += pts;
  if (perkVal('vamp')) P.hp = Math.min(P.maxHp, P.hp + perkVal('vamp'));
  if (perkVal('deathBurst')) {
    enemies.forEach(o => {
      if (o===e||!o.alive) return;
      if (dist(e,o)<3) { damageEnemy(o, 18, elKey); var d=dist(e,o)||1; o.vx+=(o.x-e.x)/d*0.15; o.vz+=(o.z-e.z)/d*0.15; }
    });
  }
  sparkBurst3(e.x, e.z, e.elite?0xffdd00:EN[e.type].color, e.elite?18:8, 0.1, 0.1, 15);
  scene.remove(e.mesh);
  var idx = enemyMeshes.indexOf(e.mesh);
  if (idx >= 0) enemyMeshes.splice(idx, 1);
}

function damagePlayer(dmg) {
  if (P.inv > 0 || P.dashing || P.blazeDashT > 0 || !P.alive) return;
  var reduce = perkVal('dmgReduce') + (P.el === 'earth' ? 0.2 : 0);
  var actual = Math.floor(dmg * (1 - reduce));
  P.hp -= actual; P.inv = 30; P.dmgFlash = 10;
  sparkBurst3(P.x, P.z, 0xff3333, 5, 0.06, 0.05, 8);
  if (P.hp <= 0) { P.hp = 0; P.alive = false; playerDeath(); }
}

function playerDeath() {
  state = 'dead';
  if (score > highScore) { highScore = score; localStorage.setItem('el_hs', highScore + ''); }
  sparkBurst3(P.x, P.z, 0xffffff, 30, 0.15, 0.08, 20);
  setTimeout(() => {
    document.getElementById('death-stats').innerHTML =
      '<div>Score: <b>'+score.toLocaleString()+'</b></div>'+
      '<div>Wave: <b>'+wave+'</b></div>'+
      '<div>Kills: <b>'+kills+'</b></div>'+
      '<div>Best Combo: <b>x'+comboMax+'</b></div>'+
      (score>=highScore?'<div style="color:#f59e0b;margin-top:4px">NEW HIGH SCORE!</div>':'<div>High: <b>'+highScore.toLocaleString()+'</b></div>');
    document.getElementById('death-scr').style.display = 'flex';
  }, 600);
}

// ================================================================
//  ABILITIES
// ================================================================
function useAbility(slot) {
  var cdKey = P.el + '_' + slot;
  if (cooldowns[cdKey] > 0 || !P.alive) return;
  var el = P.el;
  cooldowns[cdKey] = slot === 1 ? EL[el].ab1.cd : EL[el].ab2.cd;

  if (el==='fire'&&slot===1) { // Flame Arc
    var range = 6, arc = PI*2/3, dmg = Math.floor(45*(1+perkVal('allDmg'))*(avActive?1.8:1));
    enemies.forEach(e => { if(!e.alive) return; var d=dist(P,e); if(d<range){var ea=angleTo(P,e);var diff=((ea-P.angle+PI)%PI2+PI2)%PI2-PI;if(Math.abs(diff)<arc/2){damageEnemy(e,dmg,'fire');e.burn=120;var dd=d||1;e.vx+=(e.x-P.x)/dd*0.2;e.vz+=(e.z-P.z)/dd*0.2;}} });
    for(var i=0;i<20;i++){var pa=P.angle+rnd(-arc/2,arc/2);var pr=rnd(1,range);spark3(P.x+Math.cos(pa)*pr,rnd(0.2,1.5),P.z+Math.sin(pa)*pr,Math.cos(pa)*0.05,0.02,Math.sin(pa)*0.05,0xff5533,rnd(0.05,0.12),rnd(10,20));}

  } else if (el==='fire'&&slot===2) { // Blaze Dash
    P.blazeDashT = 12; P.blazeDashA = P.angle; P.inv = 14;

  } else if (el==='water'&&slot===1) { // Ice Burst
    var range=7,dmg=Math.floor(20*(1+perkVal('allDmg'))*(avActive?1.8:1));
    enemies.forEach(e => { if(!e.alive||dist(P,e)>range) return; damageEnemy(e,dmg,'water'); e.freeze=120; e.stun=120; });
    sparkBurst3(P.x,P.z,0x88ddff,15,0.12,0.08,15);

  } else if (el==='water'&&slot===2) { // Heal Tide
    P.hp=Math.min(P.maxHp,P.hp+30);
    var range=8,dmg=Math.floor(25*(1+perkVal('allDmg'))*(avActive?1.8:1));
    enemies.forEach(e => { if(!e.alive||dist(P,e)>range) return; damageEnemy(e,dmg,'water'); var d=dist(P,e)||1;e.vx+=(e.x-P.x)/d*0.15;e.vz+=(e.z-P.z)/d*0.15; });
    sparkBurst3(P.x,P.z,0x33aaff,12,0.1,0.07,12);

  } else if (el==='earth'&&slot===1) { // Rock Wall
    var wx=P.x+Math.cos(P.angle)*4,wz=P.z+Math.sin(P.angle)*4;
    var mat=makeMat(0x556633,0x334411,0.1);
    var mesh=new THREE.Mesh(boxGeo,mat);
    mesh.scale.set(4,2,0.8); mesh.position.set(wx,1,wz); mesh.rotation.y=-P.angle;
    scene.add(mesh); wallMeshes.push(mesh);
    walls3.push({x:wx,z:wz,w:4,h:0.8,angle:P.angle,life:360,mesh:mesh});
    sparkBurst3(wx,wz,0xaaaa44,10,0.06,0.08,12);

  } else if (el==='earth'&&slot===2) { // Quake Slam
    var range=9,dmg=Math.floor(55*(1+perkVal('allDmg'))*(avActive?1.8:1));
    enemies.forEach(e => { if(!e.alive||dist(P,e)>range) return; damageEnemy(e,dmg,'earth'); e.stun=90; var d=dist(P,e)||1;e.vx+=(e.x-P.x)/d*0.25;e.vz+=(e.z-P.z)/d*0.25; });
    sparkBurst3(P.x,P.z,0x99aa44,20,0.15,0.1,18);

  } else if (el==='air'&&slot===1) { // Wind Shield
    P.windShieldT = 180;
    enemies.forEach(e => { if(!e.alive) return; var d=dist(P,e); if(d<5&&d>0){e.vx+=(e.x-P.x)/d*0.3;e.vz+=(e.z-P.z)/d*0.3;} });
    sparkBurst3(P.x,P.z,0xccddee,10,0.08,0.06,10);

  } else if (el==='air'&&slot===2) { // Tornado
    var mat=new THREE.MeshBasicMaterial({color:0xbbccee,transparent:true,opacity:0.3});
    var mesh=new THREE.Mesh(coneGeo,mat);
    mesh.scale.set(1.5,3,1.5); mesh.position.set(P.x,1.5,P.z);
    scene.add(mesh); tornadoMeshes.push(mesh);
    tornadoes.push({x:P.x+Math.cos(P.angle)*1.5,z:P.z+Math.sin(P.angle)*1.5,vx:Math.cos(P.angle)*0.12,vz:Math.sin(P.angle)*0.12,r:2.5,life:240,dmgCd:0,mesh:mesh});
  }
}

function activateAvatar() {
  if (avCharge < 100 || avActive) return;
  avActive = true; avTimer = 600; avCharge = 0;
  sparkBurst3(P.x, P.z, 0xffffff, 30, 0.15, 0.1, 20);
  sparkBurst3(P.x, P.z, 0xff5533, 15, 0.12, 0.08, 18);
  sparkBurst3(P.x, P.z, 0x33aaff, 15, 0.12, 0.08, 18);
}

}

var keys = {};
var mx = 0, my = 0, mDown = false;
var moveJ = null, aimJ = null, moveO = null, aimO = null;

document.addEventListener('keydown', function(e) {
  keys[e.key.toLowerCase()] = true;
  if (e.key>='1'&&e.key<='4') switchEl(EL_KEYS[+e.key-1]);
  if (e.key==='q') useAbility(1);
  if (e.key==='e') useAbility(2);
  if (e.key===' ') { e.preventDefault(); activateAvatar(); }
  if (e.key==='Shift') tryDash();
});

renderer.domElement.addEventListener('mousemove', function(e) { mx = e.clientX; my = e.clientY; });
renderer.domElement.addEventListener('mousedown', function() { mDown = true; });
renderer.domElement.addEventListener('mouseup', function() { mDown = false; });
renderer.domElement.addEventListener('contextmenu', function(e) { e.preventDefault(); });

// Touch joysticks
var joyL = document.getElementById('joy-l'), joyR = document.getElementById('joy-r');
function joyCalc(origin, touch) {
  var dx = touch.clientX - origin.x, dy = touch.clientY - origin.y;
  var d = Math.sqrt(dx*dx+dy*dy), max = 55, mag = Math.min(d, max)/max;
  return d > 8 ? { dx:dx/Math.max(d,1), dy:dy/Math.max(d,1), mag:mag, ox:origin.x, oy:origin.y, id:touch.identifier } : { dx:0, dy:0, mag:0, ox:origin.x, oy:origin.y, id:touch.identifier };
}
joyL.addEventListener('touchstart', function(e) { e.preventDefault(); var t=e.changedTouches[0]; moveO={x:t.clientX,y:t.clientY,id:t.identifier}; moveJ=joyCalc(moveO,t); }, {passive:false});
joyR.addEventListener('touchstart', function(e) { e.preventDefault(); var t=e.changedTouches[0]; aimO={x:t.clientX,y:t.clientY,id:t.identifier}; aimJ=joyCalc(aimO,t); }, {passive:false});
joyL.addEventListener('touchmove', function(e) { e.preventDefault(); if(!moveO)return; for(var i=0;i<e.changedTouches.length;i++){var t=e.changedTouches[i];if(t.identifier===moveO.id)moveJ=joyCalc(moveO,t);} }, {passive:false});
joyR.addEventListener('touchmove', function(e) { e.preventDefault(); if(!aimO)return; for(var i=0;i<e.changedTouches.length;i++){var t=e.changedTouches[i];if(t.identifier===aimO.id)aimJ=joyCalc(aimO,t);} }, {passive:false});
joyL.addEventListener('touchend', function(e) { e.preventDefault(); for(var i=0;i<e.changedTouches.length;i++){if(moveO&&moveO.id===e.changedTouches[i].identifier){moveJ=null;moveO=null;}} }, {passive:false});
joyR.addEventListener('touchend', function(e) { e.preventDefault(); for(var i=0;i<e.changedTouches.length;i++){if(aimO&&aimO.id===e.changedTouches[i].identifier){aimJ=null;aimO=null;}} }, {passive:false});

// Buttons
document.querySelectorAll('.el-btn').forEach(function(b) {
  var h = function(e) { e.preventDefault(); e.stopPropagation(); switchEl(b.dataset.el); };
  b.addEventListener('click', h); b.addEventListener('touchstart', h, {passive:false});
});
['click','touchstart'].forEach(function(ev) {

  document.getElementById('ab2-btn').addEventListener(ev, function(e){e.preventDefault();useAbility(2);}, {passive:false});
  document.getElementById('btn-ava').addEventListener(ev, function(e){e.preventDefault();activateAvatar();}, {passive:false});

});

function startGame() {
  document.getElementById('title-scr').style.display = 'none';
  document.getElementById('death-scr').style.display = 'none';
  document.body.classList.remove('in-menu');
  initGame();
  state = 'playing';
}

function tryDash() {
  if (!P || P.dashCd > 0 || P.dashing || !P.alive) return;
  var dx = 0, dz = 0;
  if (moveJ) { dx = moveJ.dx; dz = moveJ.dy; }
  else { if(keys.w||keys.arrowup)dz-=1;if(keys.s||keys.arrowdown)dz+=1;if(keys.a||keys.arrowleft)dx-=1;if(keys.d||keys.arrowright)dx+=1; }
  if (dx===0&&dz===0) { dx=Math.cos(P.angle); dz=Math.sin(P.angle); }
  var len = Math.sqrt(dx*dx+dz*dz)||1;
  P.dashA = Math.atan2(dz/len, dx/len);
  P.dashing = true; P.dashT = P.el==='air'?12:8;
  P.dashCd = P.el==='air'?45:60;
  P.inv = P.dashT + 2;
  sparkBurst3(P.x, P.z, EL[P.el].hex, 6, 0.04, 0.04, 8);
}

// ================================================================
//  UPGRADE SYSTEM
// ================================================================
function showUpgrades() {
  state = 'upgrades';
  var avail = UPGRADES.filter(function(u){ return perks.filter(function(p){return p.id===u.id}).length < 3; });
  var picks = avail.sort(function(){return Math.random()-0.5}).slice(0,3);
  var c = document.getElementById('up-cards'); c.innerHTML = '';
  document.getElementById('up-ov').style.display = 'flex';
  picks.forEach(function(up) {
    var card = document.createElement('div');
    card.className = 'up-card'; card.style.borderColor = up.color;
    card.innerHTML = '<div class="up-icon">'+up.icon+'</div><div class="up-name" style="color:'+up.color+'">'+up.name+'</div><div class="up-desc">'+up.desc+'</div>';
    var pick = function() {
      perks.push(up);
      document.getElementById('up-ov').style.display = 'none';
      if (up.fx.maxHp) { P.maxHp += up.fx.maxHp; P.hp = Math.min(P.hp+up.fx.maxHp, P.maxHp); }
      nextWave();
    };
    card.addEventListener('click', pick);
    card.addEventListener('touchend', function(e) { e.preventDefault(); pick(); });
    c.appendChild(card);
  });
}

// ================================================================
//  UPDATE
// ================================================================
function update() {
  if (state !== 'playing' && state !== 'waveIntro') return;
  if (hitstop > 0) { hitstop--; return; }
  ticks++;

  // === Player ===
  if (P.alive) {
    var spd = playerSpd();
    var dx = 0, dz = 0;
    if (moveJ) { dx = moveJ.dx * moveJ.mag; dz = moveJ.dy * moveJ.mag; }
    else { if(keys.w||keys.arrowup)dz-=1;if(keys.s||keys.arrowdown)dz+=1;if(keys.a||keys.arrowleft)dx-=1;if(keys.d||keys.arrowright)dx+=1;
      if(dx&&dz){var l=Math.sqrt(dx*dx+dz*dz);dx/=l;dz/=l;} }

    if (P.blazeDashT > 0) {
      P.x += Math.cos(P.blazeDashA)*0.4; P.z += Math.sin(P.blazeDashA)*0.4;
      P.blazeDashT--;
      enemies.forEach(function(e) { if(!e.alive||dist(P,e)>P.r+e.r+0.5) return;
        damageEnemy(e, Math.floor(30*(1+perkVal('allDmg'))*(avActive?1.8:1)), 'fire'); e.burn=90; });
      sparkBurst3(P.x, P.z, 0xff6633, 2, 0.04, 0.06, 8);
    } else if (P.dashing) {
      var dSpd = P.el==='air' ? 0.5 : 0.4;
      P.x += Math.cos(P.dashA)*dSpd; P.z += Math.sin(P.dashA)*dSpd;
      P.dashT--; if (P.dashT<=0) P.dashing=false;
      sparkBurst3(P.x, P.z, EL[P.el].hex, 1, 0.03, 0.03, 6);
    } else {
      P.x += dx * spd; P.z += dz * spd;
    }

    // Aim
    if (aimJ) { P.angle = Math.atan2(aimJ.dy, aimJ.dx); P.firing = true; }
    else if (!isMob) {
      // Raycast mouse to ground plane
      var ndcX = (mx/W)*2-1, ndcY = -(my/H)*2+1;
      var ray = new THREE.Raycaster();
      ray.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);
      var plane = new THREE.Plane(v3(0,1,0), 0);
      var pt = new THREE.Vector3();
      ray.ray.intersectPlane(plane, pt);
      if (pt) P.angle = Math.atan2(pt.z - P.z, pt.x - P.x);
      P.firing = mDown;
    } else { P.firing = false; }

    if (P.firing && P.fireCd <= 0) firePrimary();
    if (P.fireCd > 0) P.fireCd--;
    if (P.dashCd > 0) P.dashCd--;
    if (P.inv > 0) P.inv--;
    if (P.dmgFlash > 0) P.dmgFlash--;

    // Wind shield
    if (P.windShieldT > 0) {
      P.windShieldT--;
      if (ticks%10===0) enemies.forEach(function(e){ if(!e.alive)return;var d=dist(P,e);if(d<4&&d>0){e.vx+=(e.x-P.x)/d*0.08;e.vz+=(e.z-P.z)/d*0.08;} });
      // Deflect enemy projectiles
      for (var i=eProjs.length-1;i>=0;i--) { var ep=eProjs[i]; if(dist(P,ep)<2){ep.vx*=-1;ep.vz*=-1;ep.deflected=true;sparkBurst3(ep.x,ep.z,0xccddee,2,0.02,0.03,5);} }
    }

    // Arena bounds
    P.x = clamp(P.x, -ARENA_W/2+0.5, ARENA_W/2-0.5);
    P.z = clamp(P.z, -ARENA_H/2+0.5, ARENA_H/2-0.5);

    // Pillar collision
    pillars3.forEach(function(p) { var d=Math.sqrt((P.x-p.x)**2+(P.z-p.z)**2);var min=0.5+p.r;if(d<min&&d>0){P.x=p.x+(P.x-p.x)/d*min;P.z=p.z+(P.z-p.z)/d*min;} });
  }

  // === Projectiles ===
  for (var i=projs.length-1;i>=0;i--) {
    var p=projs[i];
    if (p.homing>0) {
      var closest=null,cDist=10;
      enemies.forEach(function(e){if(!e.alive)return;var d=dist(p,e);if(d<cDist){closest=e;cDist=d;}});
      if(closest){var ta=angleTo(p,closest);var ca=Math.atan2(p.vz,p.vx);var diff=((ta-ca+PI)%PI2+PI2)%PI2-PI;var turn=clamp(diff,-p.homing,p.homing);var spd=Math.sqrt(p.vx*p.vx+p.vz*p.vz);var na=ca+turn;p.vx=Math.cos(na)*spd;p.vz=Math.sin(na)*spd;}
    }
    p.x+=p.vx;p.z+=p.vz;p.life--;p.mesh.position.set(p.x,0.5,p.z);

    // Bounds
    if(Math.abs(p.x)>ARENA_W/2||Math.abs(p.z)>ARENA_H/2) { scene.remove(p.mesh);var idx=projMeshes.indexOf(p.mesh);if(idx>=0)projMeshes.splice(idx,1);projs.splice(i,1);continue; }

    // Hit enemies
    var hitE=false;
    for(var j=0;j<enemies.length;j++){
      var e=enemies[j]; if(!e.alive||p.pierced.indexOf(e)>=0) continue;
      if(dist(p,e)<e.r+p.r) {
        damageEnemy(e,p.dmg,p.el);
        if(!EN[e.type].noKB){var d=dist(p,e)||1;e.vx+=(e.x-p.x)/d*p.kb;e.vz+=(e.z-p.z)/d*p.kb;}
        if(p.burn) e.burn=Math.max(e.burn,p.burn);
        p.pierced.push(e);
        if(p.pierced.length>p.pierce){
          if(p.explosive){
            enemies.forEach(function(ee){if(!ee.alive)return;var dd=dist(p,ee);if(dd<p.explosionR){damageEnemy(ee,Math.floor(p.dmg*0.4),p.el);if(!EN[ee.type].noKB&&dd>0){ee.vx+=(ee.x-p.x)/dd*0.15;ee.vz+=(ee.z-p.z)/dd*0.15;}}});
            sparkBurst3(p.x,p.z,EL[p.el].hex,10,0.08,0.08,12);
          }
          scene.remove(p.mesh);var idx2=projMeshes.indexOf(p.mesh);if(idx2>=0)projMeshes.splice(idx2,1);projs.splice(i,1);hitE=true;break;
        }
      }
    }
    if(hitE)continue;
    if(p.life<=0){scene.remove(p.mesh);var idx3=projMeshes.indexOf(p.mesh);if(idx3>=0)projMeshes.splice(idx3,1);projs.splice(i,1);}
  }

  // === Enemies ===
  for (var i=enemies.length-1;i>=0;i--) {
    var e=enemies[i]; if(!e.alive){enemies.splice(i,1);continue;}
    if(e.flash>0)e.flash--;
    if(e.stun>0){e.stun--;e.vx*=0.9;e.vz*=0.9;e.x+=e.vx;e.z+=e.vz;e.mesh.position.set(e.x,e.r,e.z);continue;}
    if(e.freeze>0){e.freeze--;continue;}
    e.atkCd=Math.max(0,e.atkCd-1);
    var def=EN[e.type];
    if(e.burn>0){e.burn--;if(ticks%20===0){e.hp-=3;spark3(e.x,e.r+0.3,e.z,0,0.02,0,0xff6633,0.05,8);if(e.hp<=0&&e.alive)killEnemy(e,P.el);}}

    var dx2=P.x-e.x,dz2=P.z-e.z,d2=Math.sqrt(dx2*dx2+dz2*dz2)||1,nx=dx2/d2,nz=dz2/d2;

    if(def.ai==='chase'){
      e.x+=nx*e.spd+e.vx;e.z+=nz*e.spd+e.vz;
      if(d2<e.r+0.5&&e.atkCd<=0){damagePlayer(e.dmg);e.atkCd=60;}
    } else if(def.ai==='ranged'){
      if(d2>(def.range||12)*0.7){e.x+=nx*e.spd+e.vx;e.z+=nz*e.spd+e.vz;}
      else if(d2<(def.range||12)*0.35){e.x-=nx*e.spd*0.5;e.z-=nz*e.spd*0.5;}
      else{e.phase+=0.02;e.x+=Math.cos(e.phase)*e.spd*0.5+e.vx;e.z+=Math.sin(e.phase)*e.spd*0.5+e.vz;}
      if(d2<(def.range||12)&&e.atkCd<=0){
        var pa=Math.atan2(dz2,dx2)+rnd(-0.1,0.1);
        var mat2=new THREE.MeshBasicMaterial({color:def.color||0xff4444});
        var mesh2=new THREE.Mesh(sphereGeo,mat2);mesh2.scale.set(0.12,0.12,0.12);mesh2.position.set(e.x,0.5,e.z);
        scene.add(mesh2);eProjMeshes.push(mesh2);
        eProjs.push({x:e.x,z:e.z,vx:Math.cos(pa)*0.2,vz:Math.sin(pa)*0.2,r:0.12,dmg:e.dmg,mesh:mesh2,life:100,deflected:false});
        e.atkCd=def.rate||80;
      }
    } else if(def.ai==='shield'){
      e.x+=nx*e.spd+e.vx;e.z+=nz*e.spd+e.vz;
      if(d2<e.r+0.5&&e.atkCd<=0){damagePlayer(e.dmg);e.atkCd=60;}
    } else if(def.ai==='charge'){
      if(!e.charging){
        e.x+=nx*e.spd*0.5+e.vx;e.z+=nz*e.spd*0.5+e.vz;
        if(d2<(def.chRange||10)&&e.atkCd<=0){e.chargeW=40;e.chargeA=Math.atan2(dz2,dx2);e.atkCd=120;}
        if(e.chargeW>0){e.chargeW--;if(e.chargeW<=0){e.charging=true;e.chargeT=25;}}
      } else {
        e.x+=Math.cos(e.chargeA)*(def.chSpd||0.25);e.z+=Math.sin(e.chargeA)*(def.chSpd||0.25);
        e.chargeT--;if(e.chargeT<=0)e.charging=false;
        if(d2<e.r+0.5){damagePlayer(Math.floor(e.dmg*1.5));e.charging=false;}
      }
    }

    e.vx*=0.85;e.vz*=0.85;
    e.x=clamp(e.x,-ARENA_W/2+e.r,ARENA_W/2-e.r);
    e.z=clamp(e.z,-ARENA_H/2+e.r,ARENA_H/2-e.r);

    // Enemy separation
    for(var j=0;j<enemies.length;j++){var o=enemies[j];if(o===e||!o.alive)continue;var sd=dist(e,o),sm=e.r+o.r;if(sd<sm&&sd>0){var push=(sm-sd)*0.2;e.x+=(e.x-o.x)/sd*push;e.z+=(e.z-o.z)/sd*push;}}

    // Update mesh
    e.mesh.position.set(e.x, e.r, e.z);
    if(e.flash>0)e.mesh.material.emissive.setHex(0xffffff);
    else if(e.freeze>0)e.mesh.material.emissive.setHex(0x88ddff);
    else e.mesh.material.emissive.setHex(e.elite?0xffdd00:(EN[e.type].color));
    e.mesh.material.emissiveIntensity = e.flash>0?1:(e.freeze>0?0.5:0.2);
  }

  // === Enemy projectiles ===
  for(var i=eProjs.length-1;i>=0;i--){
    var ep=eProjs[i];ep.x+=ep.vx;ep.z+=ep.vz;ep.life--;ep.mesh.position.set(ep.x,0.5,ep.z);
    if(!ep.deflected&&dist(P,ep)<0.5&&P.alive){damagePlayer(ep.dmg);scene.remove(ep.mesh);var idx=eProjMeshes.indexOf(ep.mesh);if(idx>=0)eProjMeshes.splice(idx,1);eProjs.splice(i,1);continue;}
    if(ep.deflected){for(var j=0;j<enemies.length;j++){var ee=enemies[j];if(!ee.alive)continue;if(dist(ep,ee)<ee.r){damageEnemy(ee,ep.dmg,P.el);scene.remove(ep.mesh);var idx2=eProjMeshes.indexOf(ep.mesh);if(idx2>=0)eProjMeshes.splice(idx2,1);eProjs.splice(i,1);break;}}}
    if(ep.life<=0||Math.abs(ep.x)>ARENA_W/2||Math.abs(ep.z)>ARENA_H/2){scene.remove(ep.mesh);var idx3=eProjMeshes.indexOf(ep.mesh);if(idx3>=0)eProjMeshes.splice(idx3,1);eProjs.splice(i,1);}
  }

  // === Particles ===
  for(var i=particles3.length-1;i>=0;i--){
    var pp=particles3[i];pp.mesh.position.x+=pp.vx;pp.mesh.position.y+=pp.vy;pp.mesh.position.z+=pp.vz;
    pp.vx*=0.94;pp.vy-=0.001;pp.vz*=0.94;pp.life--;
    pp.mesh.material.opacity=pp.life/pp.maxLife;
    var sc=pp.mesh.scale.x*0.97;pp.mesh.scale.set(sc,sc,sc);
    if(pp.life<=0){scene.remove(pp.mesh);var idx=particleMeshes.indexOf(pp.mesh);if(idx>=0)particleMeshes.splice(idx,1);particles3.splice(i,1);}
  }

  // === Walls ===
  for(var i=walls3.length-1;i>=0;i--){walls3[i].life--;if(walls3[i].life<=0){scene.remove(walls3[i].mesh);var idx=wallMeshes.indexOf(walls3[i].mesh);if(idx>=0)wallMeshes.splice(idx,1);walls3.splice(i,1);}}

  // === Tornadoes ===
  for(var i=tornadoes.length-1;i>=0;i--){
    var t=tornadoes[i];t.x+=t.vx;t.z+=t.vz;t.life--;t.dmgCd--;
    t.mesh.position.set(t.x,1.5,t.z);t.mesh.rotation.y+=0.1;
    enemies.forEach(function(e){if(!e.alive)return;var d=dist(t,e);if(d<t.r&&d>0){e.vx+=(t.x-e.x)/d*0.08;e.vz+=(t.z-e.z)/d*0.08;if(t.dmgCd<=0)damageEnemy(e,Math.floor(12*(1+perkVal('allDmg'))*(avActive?1.8:1)),'air');}});
    if(t.dmgCd<=0)t.dmgCd=15;
    if(ticks%3===0)spark3(t.x+rnd(-1,1),rnd(0.5,2.5),t.z+rnd(-1,1),rnd(-0.02,0.02),0.02,rnd(-0.02,0.02),0xbbccee,rnd(0.03,0.06),10);
    if(t.life<=0||Math.abs(t.x)>ARENA_W/2||Math.abs(t.z)>ARENA_H/2){scene.remove(t.mesh);var idx=tornadoMeshes.indexOf(t.mesh);if(idx>=0)tornadoMeshes.splice(idx,1);tornadoes.splice(i,1);}
  }

  // === Spawning ===
  if (state === 'playing') {
    wTimer++;
    var rate = Math.max(10, 50 - wave*3);
    if (wTimer % rate === 0 && eSpawned < eTotal) spawnEnemy();
  }

  // === Avatar ===
  if (avActive) {
    avTimer--;
    if (avTimer <= 0) avActive = false;
    if (ticks%4===0) {
      var cols=[0xff5533,0x33aaff,0x77aa33,0xccddee];
      spark3(P.x+rnd(-1,1),rnd(0.3,1.5),P.z+rnd(-1,1),rnd(-0.02,0.02),0.01,rnd(-0.02,0.02),cols[Math.floor(rnd(0,4))],rnd(0.04,0.08),12);
    }
  }

  // === Combo decay ===
  if(comboT>0){comboT--;if(comboT<=0)combo=0;}

  // === Regen ===
  var regen = perkVal('regen') + (P.el==='water'?0.5:0);
  if(regen>0&&P.alive) P.hp=Math.min(P.maxHp, P.hp+regen/60);

  // === Cooldowns ===
  for(var k in cooldowns) if(cooldowns[k]>0) cooldowns[k]--;

  // === Wave complete ===
  if(eLeft<=0&&eSpawned>=eTotal&&state==='playing') showUpgrades();

  // === Update 3D ===
  if (P.alive && playerMesh) {
    playerMesh.position.set(P.x, 0.5 + Math.sin(ticks*0.05)*0.05, P.z);
    playerGlow.position.set(P.x, 0.05, P.z);
    playerGlow.rotation.z = ticks * 0.01;
    playerDir.position.set(P.x + Math.cos(P.angle)*0.8, 0.5, P.z + Math.sin(P.angle)*0.8);
    playerDir.rotation.y = -P.angle + PI/2;
    playerLight.position.set(P.x, 2, P.z);
    playerLight.intensity = avActive ? 3 : 1.5;
    playerLight.color.setHex(avActive ? 0xffffff : EL[P.el].hex);

    if (P.dmgFlash > 0) playerMesh.material.emissive.setHex(0xff0000);
    else playerMesh.material.emissive.setHex(EL[P.el].hex);
    playerMesh.material.emissiveIntensity = avActive ? 0.8 : 0.3;
    playerMesh.visible = !(P.inv > 0 && P.inv % 4 < 2);
  }

  // === Camera ===
  cam3.x = lerpA(cam3.x, P.x, 0.06);
  cam3.z = lerpA(cam3.z, P.z, 0.06);
  camera.position.set(cam3.x, 28, cam3.z + 16);
  camera.lookAt(cam3.x, 0, cam3.z);

  // === HUD ===
  document.getElementById('hud-score').textContent = score.toLocaleString();
  document.getElementById('hud-wave').textContent = 'WAVE ' + wave;
  var hpPct = Math.max(0, P.hp/P.maxHp*100);
  var hpFill = document.getElementById('hp-fill');
  hpFill.style.width = hpPct+'%';
  hpFill.style.background = hpPct>50?'linear-gradient(90deg,#22c55e,#16a34a)':hpPct>25?'linear-gradient(90deg,#eab308,#f59e0b)':'linear-gradient(90deg,#ef4444,#dc2626)';
  document.getElementById('hp-txt').textContent = Math.ceil(P.hp)+'/'+P.maxHp;
  document.getElementById('av-fill').style.width = (avActive?100*avTimer/600:avCharge)+'%';
  document.getElementById('av-txt').textContent = avActive?'AVATAR STATE!':'AVATAR STATE';
  var avBtn=document.getElementById('btn-ava');
  if(avCharge>=100&&!avActive){avBtn.classList.add('ready');avBtn.textContent='AVA';}
  else if(avActive){avBtn.classList.remove('ready');avBtn.textContent=Math.ceil(avTimer/60)+'s';}
  else{avBtn.classList.remove('ready');avBtn.textContent=Math.floor(avCharge)+'%';}
  var cEl=document.getElementById('hud-combo');
  if(combo>=2){cEl.textContent='COMBO x'+combo;cEl.classList.add('show');}else{cEl.classList.remove('show');}

  // Ability buttons
  [1,2].forEach(function(slot){
    var cdKey=P.el+'_'+slot;var btn=document.getElementById('ab'+slot+'-btn');
    var ab=slot===1?EL[P.el].ab1:EL[P.el].ab2;
    if(cooldowns[cdKey]>0){btn.classList.remove('ab-ready');btn.textContent=(cooldowns[cdKey]/60).toFixed(1);btn.style.borderColor='#222';}
    else{btn.classList.add('ab-ready');btn.textContent=ab.name.split(' ').map(function(w){return w[0]}).join('');btn.style.borderColor=EL[P.el].css+'88';}
  });
  var dBtn=document.getElementById('btn-dash');
  if(P.dashCd>0){dBtn.classList.add('cd');dBtn.textContent=(P.dashCd/60).toFixed(1);}
  else{dBtn.classList.remove('cd');dBtn.textContent='DASH';}
}

// ================================================================
//  JOYSTICK VISUALS (Canvas overlay)
// ================================================================
var joyCanvas = document.createElement('canvas');
joyCanvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:16;pointer-events:none';
document.body.appendChild(joyCanvas);
var jCtx = joyCanvas.getContext('2d');
function resizeJoy() { joyCanvas.width = innerWidth; joyCanvas.height = innerHeight; }
resizeJoy(); addEventListener('resize', resizeJoy);

function drawJoysticks() {
  jCtx.clearRect(0, 0, joyCanvas.width, joyCanvas.height);
  [moveJ, aimJ].forEach(function(j, idx) {
    if (!j || !j.ox) return;
    jCtx.save(); jCtx.globalAlpha = 0.2;
    var col = idx === 0 ? '#ffffff' : (P ? EL[P.el].css : '#fff');
    jCtx.beginPath(); jCtx.arc(j.ox, j.oy, 50, 0, PI2);
    jCtx.strokeStyle = col; jCtx.lineWidth = 2; jCtx.stroke();
    var sx = j.ox + j.dx * j.mag * 40, sy = j.oy + j.dy * j.mag * 40;
    jCtx.beginPath(); jCtx.arc(sx, sy, 16, 0, PI2);
    jCtx.fillStyle = col; jCtx.globalAlpha = 0.3; jCtx.fill();
    jCtx.restore();
  });
}

// ================================================================
//  GAME LOOP
// ================================================================
var lastT = -1, accum = 0;
var TICK = 1000/60;

function loop(ts) {
  requestAnimationFrame(loop);
  try {
    if (lastT < 0) { lastT = ts; return; }
    var dt = Math.min(ts - lastT, 100);
    lastT = ts;
    accum += dt;
    var steps = 0;
    while (accum >= TICK && steps < 5) { update(); accum -= TICK; steps++; }
    if (steps >= 5) accum = 0;

    // Render 3D
    renderer.render(scene, camera);

    // Joystick overlay
    if (isMob) drawJoysticks();
  } catch(e) { console.error('Loop:', e); }
}

// Show high score
if (highScore > 0) {
  document.getElementById('hs-disp').style.display = 'block';
  document.getElementById('hs-disp').textContent = 'HIGH SCORE: ' + highScore.toLocaleString();
}

requestAnimationFrame(loop);
</script>
