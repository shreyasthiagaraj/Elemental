<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>ELEMENTAL</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #08080c; overflow: hidden; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  user-select: none; -webkit-user-select: none; touch-action: none;
  -webkit-touch-callout: none; position: fixed; width: 100%; height: 100%;
}
canvas#game { display: block; position: fixed; top: 0; left: 0; outline: none; z-index: 1; }

/* ---- HUD ---- */
#hud-top { position: fixed; top: max(8px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); text-align: center; z-index: 20; pointer-events: none; }
#hud-top .score { font-size: 20px; font-weight: 700; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); letter-spacing: 2px; }
#hud-top .wave-info { font-size: 12px; color: #aaa; margin-top: 2px; letter-spacing: 1px; }
#hud-top .combo { font-size: 14px; font-weight: 700; color: #f0c040; margin-top: 2px; opacity: 0; transition: opacity 0.3s; }
#hud-top .combo.active { opacity: 1; }

#hp-bar-wrap { position: fixed; top: max(52px, calc(env(safe-area-inset-top) + 44px)); left: 50%; transform: translateX(-50%); width: 160px; z-index: 20; pointer-events: none; }
#hp-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
#hp-bar { height: 100%; background: linear-gradient(90deg, #4f4, #2d2); border-radius: 4px; transition: width 0.3s; width: 100%; }
#hp-text { color: #888; font-size: 10px; text-align: center; margin-top: 2px; }

#special-bar-wrap { position: fixed; top: max(72px, calc(env(safe-area-inset-top) + 64px)); left: 50%; transform: translateX(-50%); width: 120px; z-index: 20; pointer-events: none; }
#special-bar-bg { width: 100%; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
#special-bar { height: 100%; background: linear-gradient(90deg, #a855f7, #d946ef); border-radius: 3px; transition: width 0.2s; width: 0%; }
#special-text { color: #666; font-size: 9px; text-align: center; margin-top: 1px; }

/* ---- Element buttons ---- */
#element-bar { position: fixed; z-index: 25; display: flex; gap: 6px; bottom: max(12px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); }
.elem-btn { width: 48px; height: 48px; border-radius: 50%; border: 3px solid #333; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all 0.15s; position: relative; }
.elem-btn .elem-icon { font-size: 22px; filter: grayscale(0.3); }
.elem-btn.active { border-width: 3px; transform: scale(1.15); background: rgba(255,255,255,0.1); }
.elem-btn.active .elem-icon { filter: grayscale(0); }
.elem-btn .key-hint { position: absolute; top: -6px; right: -2px; font-size: 9px; color: #666; font-weight: 700; }
body.mobile .elem-btn .key-hint { display: none; }
body.mobile .elem-btn { width: 44px; height: 44px; }
body.mobile .elem-btn .elem-icon { font-size: 20px; }

/* Special button */
#btn-special { position: fixed; z-index: 25; width: 56px; height: 56px; border-radius: 50%; border: 3px solid #555; background: rgba(0,0,0,0.7); color: #888; font-size: 10px; font-weight: 700; font-family: inherit; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all 0.2s; letter-spacing: 1px; }
#btn-special.ready { border-color: #d946ef; color: #d946ef; background: rgba(217,70,239,0.15); animation: pulse-special 1.5s infinite; }
@keyframes pulse-special { 0%,100% { box-shadow: 0 0 8px rgba(217,70,239,0.3); } 50% { box-shadow: 0 0 20px rgba(217,70,239,0.6); } }
body.desktop #btn-special { bottom: max(20px, env(safe-area-inset-bottom)); right: max(20px, env(safe-area-inset-right)); }
body.mobile #btn-special { bottom: max(70px, calc(env(safe-area-inset-bottom) + 60px)); right: max(12px, env(safe-area-inset-right)); }

/* Dash button (mobile) */
#btn-dash { position: fixed; z-index: 25; width: 48px; height: 48px; border-radius: 50%; border: 2px solid #4af; background: rgba(0,0,0,0.7); color: #4af; font-size: 9px; font-weight: 700; font-family: inherit; display: none; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all 0.15s; }
body.mobile #btn-dash { display: flex; bottom: max(134px, calc(env(safe-area-inset-bottom) + 124px)); right: max(12px, env(safe-area-inset-right)); }
#btn-dash.cooldown { border-color: #333; color: #444; }

/* ---- Joystick zones ---- */
.joystick-zone { position: fixed; bottom: 0; width: 50%; height: 100%; z-index: 15; display: none; }
body.mobile .joystick-zone { display: block; }
#joystick-left { left: 0; }
#joystick-right { right: 0; }

/* ---- Screen overlays ---- */
.screen-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(8,8,12,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; touch-action: manipulation; }
.screen-overlay h1 { font-size: clamp(32px, 8vw, 64px); font-weight: 900; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 4px; }
.screen-overlay .subtitle { color: #666; font-size: clamp(11px, 2.5vw, 16px); letter-spacing: 4px; margin-bottom: 30px; text-transform: uppercase; }
.screen-overlay .stats { color: #aaa; font-size: 14px; margin-bottom: 20px; line-height: 2.2; text-align: center; }
.screen-overlay .stats .val { color: #fff; font-weight: 700; }

.menu-btn {
  display: inline-block; padding: 14px 36px; margin: 6px;
  font-family: inherit; font-size: 15px; font-weight: 700;
  color: #fff; background: rgba(255,255,255,0.06); border: 2px solid #444;
  border-radius: 8px; cursor: pointer; letter-spacing: 2px; text-transform: uppercase;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  transition: all 0.15s;
}
.menu-btn:hover { background: rgba(255,255,255,0.12); border-color: #888; }
.menu-btn:active { transform: scale(0.95); }
.menu-btn.primary { border-color: #f59e0b; color: #f59e0b; }
.menu-btn.primary:hover { background: rgba(245,158,11,0.12); }

/* ---- Perk selection ---- */
#perk-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(8,8,12,0.88); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 110; padding: 20px; }
#perk-overlay h2 { color: #f59e0b; font-size: 20px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 6px; }
#perk-overlay .perk-sub { color: #666; font-size: 12px; margin-bottom: 20px; }
#perk-cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
.perk-card {
  width: 170px; padding: 16px; background: rgba(255,255,255,0.04); border: 2px solid #333;
  border-radius: 12px; cursor: pointer; text-align: center; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
.perk-card:hover { background: rgba(255,255,255,0.08); transform: translateY(-4px); }
.perk-card:active { transform: scale(0.96); }
.perk-card .perk-icon { font-size: 28px; margin-bottom: 8px; }
.perk-card .perk-name { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.perk-card .perk-desc { font-size: 11px; color: #888; line-height: 1.4; }

/* Wave announcement */
#wave-announce { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 30; pointer-events: none; text-align: center; opacity: 0; transition: opacity 0.5s; }
#wave-announce .wave-num { font-size: clamp(48px, 12vw, 80px); font-weight: 900; color: #fff; text-shadow: 0 0 40px rgba(255,255,255,0.3); letter-spacing: 4px; }
#wave-announce .wave-label { font-size: 14px; color: #888; letter-spacing: 6px; text-transform: uppercase; }

/* Kill feed */
#kill-feed { position: fixed; top: max(90px, calc(env(safe-area-inset-top) + 80px)); right: max(12px, env(safe-area-inset-right)); z-index: 20; pointer-events: none; font-size: 11px; text-align: right; }
.kill-msg { color: #888; margin-bottom: 3px; opacity: 1; transition: opacity 0.5s; white-space: nowrap; }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Hide HUD when not playing */
body.in-menu #hud-top, body.in-menu #hp-bar-wrap, body.in-menu #special-bar-wrap,
body.in-menu #element-bar, body.in-menu #btn-special, body.in-menu #btn-dash,
body.in-menu #kill-feed, body.in-menu #wave-announce { display: none !important; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<!-- HUD -->
<div id="hud-top">
  <div class="score" id="score-display">0</div>
  <div class="wave-info" id="wave-display">WAVE 1</div>
  <div class="combo" id="combo-display">COMBO x2</div>
</div>
<div id="hp-bar-wrap"><div id="hp-bar-bg"><div id="hp-bar"></div></div><div id="hp-text">100 / 100</div></div>
<div id="special-bar-wrap"><div id="special-bar-bg"><div id="special-bar"></div></div><div id="special-text">SPECIAL</div></div>

<!-- Kill feed -->
<div id="kill-feed"></div>

<!-- Element buttons -->
<div id="element-bar">
  <div class="elem-btn active" data-elem="fire" id="btn-fire"><span class="elem-icon">&#x1F525;</span><span class="key-hint">1</span></div>
  <div class="elem-btn" data-elem="water" id="btn-water"><span class="elem-icon">&#x1F4A7;</span><span class="key-hint">2</span></div>
  <div class="elem-btn" data-elem="earth" id="btn-earth"><span class="elem-icon">&#x1FAA8;</span><span class="key-hint">3</span></div>
  <div class="elem-btn" data-elem="air" id="btn-air"><span class="elem-icon">&#x1F32A;</span><span class="key-hint">4</span></div>
</div>

<!-- Special & Dash buttons -->
<button id="btn-special">SPEC</button>
<button id="btn-dash">DASH</button>

<!-- Joystick zones -->
<div class="joystick-zone" id="joystick-left"></div>
<div class="joystick-zone" id="joystick-right"></div>

<!-- Wave announcement -->
<div id="wave-announce"><div class="wave-label">WAVE</div><div class="wave-num" id="wave-num-text">1</div></div>

<!-- Perk selection -->
<div id="perk-overlay"><h2>CHOOSE A BLESSING</h2><div class="perk-sub">Select one to continue</div><div id="perk-cards"></div></div>

<!-- Title screen -->
<div class="screen-overlay" id="title-screen">
  <h1 id="title-text" style="background: linear-gradient(135deg, #ff5533, #33bbff, #bbaa44, #ccddff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">ELEMENTAL</h1>
  <div class="subtitle">Master the Elements</div>
  <div id="highscore-display" style="color:#f59e0b; font-size:13px; margin-bottom:16px; display:none;"></div>
  <div class="menu-btn primary" id="btn-play">FREE BATTLE</div>
  <div style="color:#444; font-size:11px; margin-top:20px; letter-spacing:1px;">
    <span id="controls-hint"></span>
  </div>
</div>

<!-- Death screen -->
<div class="screen-overlay" id="death-screen" style="display:none;">
  <h1 style="color:#f04040; font-size:clamp(28px,7vw,48px);">DEFEATED</h1>
  <div class="subtitle" style="color:#555;">The elements have abandoned you</div>
  <div class="stats" id="death-stats"></div>
  <div class="menu-btn primary" id="btn-retry">FIGHT AGAIN</div>
  <div class="menu-btn" id="btn-menu-return">MENU</div>
</div>

<script>
// ============================================================
// SETUP & CONSTANTS
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) && 'ontouchstart' in window;
document.body.classList.add(isMobile ? 'mobile' : 'desktop');
document.body.classList.add('in-menu');
document.getElementById('controls-hint').textContent = isMobile ? 'DUAL STICK CONTROLS' : 'WASD + MOUSE TO PLAY';

let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

const PI2 = Math.PI * 2;
const DEG = Math.PI / 180;

// Arena
const ARENA_RADIUS = 1500;
const ARENA_CENTER = { x: 0, y: 0 };

// ============================================================
// ELEMENT DEFINITIONS
// ============================================================
const ELEMENTS = {
  fire:  { name: 'Fire',  color: '#ff5533', glow: '#ff3300', light: '#ff6644', dmg: 22, rate: 280, speed: 9,  size: 7,  pierce: 0, spread: 0.08, projLife: 60, trail: true,  explosive: true, explosionR: 40, knockback: 2 },
  water: { name: 'Water', color: '#33bbff', glow: '#0088ff', light: '#44ccff', dmg: 14, rate: 160, speed: 12, size: 5,  pierce: 1, spread: 0.05, projLife: 50, trail: true,  explosive: false, explosionR: 0, knockback: 1 },
  earth: { name: 'Earth', color: '#bbaa44', glow: '#998822', light: '#ccbb55', dmg: 40, rate: 500, speed: 7,  size: 10, pierce: 0, spread: 0.03, projLife: 55, trail: false, explosive: true, explosionR: 55, knockback: 5 },
  air:   { name: 'Air',   color: '#ccddff', glow: '#99aadd', light: '#ddeeff', dmg: 10, rate: 120, speed: 14, size: 8,  pierce: 2, spread: 0.15, projLife: 35, trail: true,  explosive: false, explosionR: 0, knockback: 3 },
};

const ELEM_KEYS = ['fire', 'water', 'earth', 'air'];

// Combo effects when switching elements
const COMBO_EFFECTS = {
  'fire_water':  { name: 'STEAM BURST',  color: '#aaddff', type: 'aoe_slow', radius: 100, duration: 180, dmg: 15 },
  'fire_earth':  { name: 'LAVA POOL',    color: '#ff6600', type: 'zone_dot',  radius: 70,  duration: 300, dmg: 3 },
  'water_earth': { name: 'MUD TRAP',     color: '#887744', type: 'aoe_slow', radius: 90,  duration: 240, dmg: 5 },
  'air_fire':    { name: 'FIRE TORNADO', color: '#ff8844', type: 'tornado',   radius: 60,  duration: 240, dmg: 8 },
  'air_water':   { name: 'ICE SHARDS',   color: '#88eeff', type: 'aoe_burst', radius: 120, duration: 1,   dmg: 30 },
  'air_earth':   { name: 'DUST STORM',   color: '#aa9966', type: 'aoe_slow', radius: 130, duration: 200, dmg: 2 },
  'water_fire':  { name: 'STEAM BURST',  color: '#aaddff', type: 'aoe_slow', radius: 100, duration: 180, dmg: 15 },
  'earth_fire':  { name: 'LAVA POOL',    color: '#ff6600', type: 'zone_dot',  radius: 70,  duration: 300, dmg: 3 },
  'earth_water': { name: 'MUD TRAP',     color: '#887744', type: 'aoe_slow', radius: 90,  duration: 240, dmg: 5 },
  'fire_air':    { name: 'FIRE TORNADO', color: '#ff8844', type: 'tornado',   radius: 60,  duration: 240, dmg: 8 },
  'water_air':   { name: 'ICE SHARDS',   color: '#88eeff', type: 'aoe_burst', radius: 120, duration: 1,   dmg: 30 },
  'earth_air':   { name: 'DUST STORM',   color: '#aa9966', type: 'aoe_slow', radius: 130, duration: 200, dmg: 2 },
};

// Special ability definitions
const SPECIALS = {
  fire:  { name: 'Inferno',    desc: 'Ring of fire', projCount: 24, projDmg: 35, projSpeed: 6, projLife: 40, projSize: 8 },
  water: { name: 'Tidal Wave', desc: 'Pushing wave',  projCount: 16, projDmg: 25, projSpeed: 8, projLife: 50, projSize: 10 },
  earth: { name: 'Earthquake', desc: 'AOE stun',      aoeRadius: 200, aoeDmg: 50, stunDuration: 120 },
  air:   { name: 'Cyclone',    desc: 'Pulling vortex', aoeRadius: 160, aoeDmg: 8, duration: 180, pullForce: 3 },
};

// ============================================================
// ENEMY DEFINITIONS
// ============================================================
const ENEMY_TYPES = {
  slime: {
    name: 'Slime', color: '#44cc44', size: 14, hp: 40, speed: 1.2, dmg: 10,
    xp: 10, behavior: 'chase', attackRange: 20, attackRate: 60,
  },
  fireImp: {
    name: 'Fire Imp', color: '#ff6633', size: 12, hp: 30, speed: 1.8, dmg: 15,
    xp: 15, behavior: 'ranged', attackRange: 250, attackRate: 90, projSpeed: 5, projSize: 5,
  },
  frostCrawler: {
    name: 'Frost Crawler', color: '#44aaff', size: 13, hp: 35, speed: 2.2, dmg: 12,
    xp: 15, behavior: 'chase', attackRange: 22, attackRate: 45,
  },
  stoneBrute: {
    name: 'Stone Brute', color: '#aa8844', size: 20, hp: 120, speed: 0.8, dmg: 25,
    xp: 25, behavior: 'charge', attackRange: 24, attackRate: 120, chargeSpeed: 5, chargeRange: 200,
  },
  windWisp: {
    name: 'Wind Wisp', color: '#bbccee', size: 10, hp: 20, speed: 3.0, dmg: 8,
    xp: 20, behavior: 'erratic', attackRange: 18, attackRate: 40, teleportChance: 0.005,
  },
  shadow: {
    name: 'Shadow', color: '#8855aa', size: 15, hp: 50, speed: 2.5, dmg: 20,
    xp: 30, behavior: 'stealth', attackRange: 22, attackRate: 50, revealRange: 150,
  },
};

// ============================================================
// PERK DEFINITIONS
// ============================================================
const PERKS = [
  { id: 'pyromaniac',   name: 'Pyromaniac',    icon: '\u{1F525}', desc: '+30% fire damage',         color: '#ff5533', effect: { elemDmg: { fire: 0.3 } } },
  { id: 'tidalForce',   name: 'Tidal Force',   icon: '\u{1F4A7}', desc: '+30% water damage',        color: '#33bbff', effect: { elemDmg: { water: 0.3 } } },
  { id: 'earthshaker',  name: 'Earthshaker',   icon: '\u{1FAA8}', desc: '+30% earth damage',        color: '#bbaa44', effect: { elemDmg: { earth: 0.3 } } },
  { id: 'galeForce',    name: 'Gale Force',    icon: '\u{1F32A}', desc: '+30% air damage',          color: '#ccddff', effect: { elemDmg: { air: 0.3 } } },
  { id: 'rapidFire',    name: 'Rapid Fire',    icon: '\u26A1',    desc: '+20% attack speed',        color: '#ffdd44', effect: { attackSpeed: 0.2 } },
  { id: 'bigBang',      name: 'Big Bang',      icon: '\u{1F4A5}', desc: '+40% projectile size',     color: '#ff8844', effect: { projSize: 0.4 } },
  { id: 'swiftFeet',    name: 'Swift Feet',    icon: '\u{1F45F}', desc: '+25% movement speed',      color: '#88ff88', effect: { moveSpeed: 0.25 } },
  { id: 'regeneration', name: 'Regeneration',  icon: '\u2764',    desc: 'Heal 1 HP per second',     color: '#44ff44', effect: { regen: 1 } },
  { id: 'fortify',      name: 'Fortify',       icon: '\u{1F6E1}', desc: '+30 max HP',               color: '#aaaaaa', effect: { maxHp: 30 } },
  { id: 'comboMaster',  name: 'Combo Master',  icon: '\u{1F300}', desc: '+60% combo window',        color: '#dd66ff', effect: { comboWindow: 0.6 } },
  { id: 'spiritCharge', name: 'Spirit Charge', icon: '\u2728',    desc: 'Special charges 40% faster', color: '#d946ef', effect: { specialRate: 0.4 } },
  { id: 'vampiric',     name: 'Vampiric',      icon: '\u{1F9E7}', desc: 'Heal 3 HP per kill',       color: '#cc3333', effect: { vampiric: 3 } },
  { id: 'elementalist', name: 'Elementalist',  icon: '\u{1F30A}', desc: '+15% all element damage',  color: '#ffaaff', effect: { allDmg: 0.15 } },
  { id: 'piercing',     name: 'Piercing',      icon: '\u{1F3AF}', desc: '+1 pierce on all attacks', color: '#ff4488', effect: { pierce: 1 } },
  { id: 'shockwave',    name: 'Shockwave',     icon: '\u{1F4AB}', desc: 'Kills cause AOE explosion', color: '#ffaa00', effect: { shockwave: true } },
  { id: 'thickSkin',    name: 'Thick Skin',    icon: '\u{1F9CA}', desc: '-20% damage taken',        color: '#6688aa', effect: { dmgReduction: 0.2 } },
];

// ============================================================
// GAME STATE
// ============================================================
let gameState = 'menu'; // menu, playing, dead, perks, waveIntro
let player, camera, enemies, projectiles, enemyProjectiles, particles, zones, floatingTexts;
let score, kills, wave, waveTimer, enemiesRemaining, enemiesSpawned, enemiesInWave;
let combo, comboTimer, comboMax;
let specialCharge, specialActive;
let screenShake, screenShakeDecay;
let hitstopFrames;
let perksOwned;
let killFeedMsgs;
let arenaObstacles;
let cycloneEffect;
let highScore = parseInt(localStorage.getItem('elemental_highscore') || '0');

function initGame() {
  player = {
    x: 0, y: 0, vx: 0, vy: 0,
    radius: 14, speed: 3.5,
    hp: 100, maxHp: 100,
    element: 'fire', prevElement: null,
    angle: 0, firing: false,
    fireCooldown: 0,
    dashCooldown: 0, dashing: false, dashTimer: 0, dashAngle: 0,
    invincible: 0,
    comboWindowBase: 60,
    alive: true,
    auraPhase: 0,
    damageFlash: 0,
  };
  camera = { x: 0, y: 0 };
  enemies = [];
  projectiles = [];
  enemyProjectiles = [];
  particles = [];
  zones = [];
  floatingTexts = [];
  killFeedMsgs = [];
  score = 0;
  kills = 0;
  wave = 0;
  waveTimer = 0;
  enemiesRemaining = 0;
  enemiesSpawned = 0;
  enemiesInWave = 0;
  combo = 0;
  comboTimer = 0;
  comboMax = 0;
  specialCharge = 0;
  specialActive = null;
  screenShake = 0;
  screenShakeDecay = 0.9;
  hitstopFrames = 0;
  perksOwned = [];
  cycloneEffect = null;
  generateArena();
  nextWave();
}

// ============================================================
// ARENA GENERATION
// ============================================================
function generateArena() {
  arenaObstacles = [];
  // Stone pillars scattered around
  const pillarCount = 12;
  for (let i = 0; i < pillarCount; i++) {
    const angle = (i / pillarCount) * PI2 + (Math.random() - 0.5) * 0.3;
    const dist = 300 + Math.random() * 900;
    arenaObstacles.push({
      x: Math.cos(angle) * dist,
      y: Math.sin(angle) * dist,
      radius: 20 + Math.random() * 15,
      type: 'pillar',
    });
  }
  // 4 elemental shrines
  ELEM_KEYS.forEach((elem, i) => {
    const angle = (i / 4) * PI2 - Math.PI / 2;
    arenaObstacles.push({
      x: Math.cos(angle) * 700,
      y: Math.sin(angle) * 700,
      radius: 30,
      type: 'shrine',
      element: elem,
    });
  });
}

// ============================================================
// WAVE SYSTEM
// ============================================================
function nextWave() {
  wave++;
  const count = 5 + wave * 3 + Math.floor(wave * wave * 0.2);
  enemiesInWave = count;
  enemiesRemaining = count;
  enemiesSpawned = 0;
  waveTimer = 0;
  gameState = 'waveIntro';
  announceWave();
  setTimeout(() => { if (gameState === 'waveIntro') gameState = 'playing'; }, 1500);
}

function announceWave() {
  const el = document.getElementById('wave-announce');
  document.getElementById('wave-num-text').textContent = wave;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 1200);
}

function getWaveEnemyTypes() {
  const types = ['slime'];
  if (wave >= 2) types.push('fireImp');
  if (wave >= 3) types.push('frostCrawler');
  if (wave >= 4) types.push('stoneBrute');
  if (wave >= 5) types.push('windWisp');
  if (wave >= 6) types.push('shadow');
  return types;
}

function spawnEnemy() {
  const types = getWaveEnemyTypes();
  const typeKey = types[Math.floor(Math.random() * types.length)];
  const def = ENEMY_TYPES[typeKey];
  // Spawn on arena edge, facing center
  const angle = Math.random() * PI2;
  const dist = ARENA_RADIUS - 50;
  const hpScale = 1 + (wave - 1) * 0.15;
  const dmgScale = 1 + (wave - 1) * 0.1;
  const e = {
    x: Math.cos(angle) * dist,
    y: Math.sin(angle) * dist,
    vx: 0, vy: 0,
    type: typeKey,
    radius: def.size,
    hp: Math.floor(def.hp * hpScale),
    maxHp: Math.floor(def.hp * hpScale),
    speed: def.speed + wave * 0.03,
    dmg: Math.floor(def.dmg * dmgScale),
    color: def.color,
    attackCooldown: 0,
    flashTimer: 0,
    stunTimer: 0,
    slowTimer: 0,
    charging: false, chargeTimer: 0, chargeAngle: 0,
    stealthAlpha: typeKey === 'shadow' ? 0 : 1,
    phase: Math.random() * PI2,
    alive: true,
  };
  // Elite every 5 waves
  if (wave % 5 === 0 && enemiesSpawned === 0) {
    e.hp *= 3;
    e.maxHp *= 3;
    e.radius *= 1.5;
    e.dmg *= 1.5;
    e.elite = true;
  }
  enemies.push(e);
  enemiesSpawned++;
}

// ============================================================
// PERK SYSTEM
// ============================================================
function getPerkBonus(key) {
  let val = 0;
  for (const p of perksOwned) {
    if (p.effect[key] !== undefined) {
      if (typeof p.effect[key] === 'boolean') return true;
      val += p.effect[key];
    }
  }
  return val;
}

function getElemDmgMult(elem) {
  let mult = 1;
  for (const p of perksOwned) {
    if (p.effect.elemDmg && p.effect.elemDmg[elem]) mult += p.effect.elemDmg[elem];
    if (p.effect.allDmg) mult += p.effect.allDmg;
  }
  return mult;
}

function showPerkSelection() {
  gameState = 'perks';
  const available = PERKS.filter(p => {
    const count = perksOwned.filter(o => o.id === p.id).length;
    return count < 3; // Max 3 stacks
  });
  // Pick 3 random
  const shuffled = available.sort(() => Math.random() - 0.5).slice(0, 3);
  const container = document.getElementById('perk-cards');
  container.innerHTML = '';
  document.getElementById('perk-overlay').style.display = 'flex';

  shuffled.forEach(perk => {
    const card = document.createElement('div');
    card.className = 'perk-card';
    card.style.borderColor = perk.color;
    card.innerHTML = `<div class="perk-icon">${perk.icon}</div><div class="perk-name" style="color:${perk.color}">${perk.name}</div><div class="perk-desc">${perk.desc}</div>`;
    card.addEventListener('click', () => pickPerk(perk));
    card.addEventListener('touchend', (e) => { e.preventDefault(); pickPerk(perk); });
    container.appendChild(card);
  });
}

function pickPerk(perk) {
  perksOwned.push(perk);
  document.getElementById('perk-overlay').style.display = 'none';

  // Apply immediate effects
  if (perk.effect.maxHp) {
    player.maxHp += perk.effect.maxHp;
    player.hp = Math.min(player.hp + perk.effect.maxHp, player.maxHp);
  }

  addFloatingText(player.x, player.y - 30, perk.name, perk.color, 40, 1.5);
  nextWave();
}

// ============================================================
// COMBAT SYSTEM
// ============================================================
function fireProjectile() {
  const elem = ELEMENTS[player.element];
  const speedMult = 1 + getPerkBonus('attackSpeed');
  const cd = elem.rate / speedMult;
  if (player.fireCooldown > 0) return;
  player.fireCooldown = cd;

  const sizeMult = 1 + getPerkBonus('projSize');
  const piercePlus = getPerkBonus('pierce') || 0;
  const angle = player.angle + (Math.random() - 0.5) * elem.spread;
  const dmg = Math.floor(elem.dmg * getElemDmgMult(player.element));

  projectiles.push({
    x: player.x + Math.cos(player.angle) * 20,
    y: player.y + Math.sin(player.angle) * 20,
    vx: Math.cos(angle) * elem.speed,
    vy: Math.sin(angle) * elem.speed,
    radius: elem.size * sizeMult,
    dmg: dmg,
    element: player.element,
    color: elem.color,
    life: elem.projLife,
    maxLife: elem.projLife,
    pierce: elem.pierce + piercePlus,
    pierced: [],
    explosive: elem.explosive,
    explosionR: elem.explosionR * sizeMult,
    knockback: elem.knockback,
    trail: elem.trail,
  });

  // Muzzle flash particles
  for (let i = 0; i < 5; i++) {
    spawnParticle(
      player.x + Math.cos(player.angle) * 22,
      player.y + Math.sin(player.angle) * 22,
      Math.cos(angle + (Math.random() - 0.5) * 0.5) * (2 + Math.random() * 3),
      Math.sin(angle + (Math.random() - 0.5) * 0.5) * (2 + Math.random() * 3),
      elem.color, 2 + Math.random() * 3, 15 + Math.random() * 10
    );
  }

  screenShake = Math.max(screenShake, 1.5);
}

function useSpecial() {
  if (specialCharge < 100) return;
  specialCharge = 0;
  const elem = player.element;
  const spec = SPECIALS[elem];

  screenShake = 12;
  addFloatingText(player.x, player.y - 40, spec.name.toUpperCase(), ELEMENTS[elem].color, 50, 2.0);

  // Big particle burst
  for (let i = 0; i < 40; i++) {
    const a = (i / 40) * PI2;
    spawnParticle(player.x, player.y, Math.cos(a) * (3 + Math.random() * 5), Math.sin(a) * (3 + Math.random() * 5),
      ELEMENTS[elem].color, 3 + Math.random() * 4, 30 + Math.random() * 20);
  }

  if (elem === 'fire' || elem === 'water') {
    // Radial projectile burst
    const count = spec.projCount;
    for (let i = 0; i < count; i++) {
      const a = (i / count) * PI2;
      projectiles.push({
        x: player.x, y: player.y,
        vx: Math.cos(a) * spec.projSpeed, vy: Math.sin(a) * spec.projSpeed,
        radius: spec.projSize, dmg: Math.floor(spec.projDmg * getElemDmgMult(elem)),
        element: elem, color: ELEMENTS[elem].color,
        life: spec.projLife, maxLife: spec.projLife, pierce: 3, pierced: [],
        explosive: elem === 'fire', explosionR: 30, knockback: 4, trail: true,
      });
    }
  } else if (elem === 'earth') {
    // AOE stun + damage
    for (const e of enemies) {
      const dx = e.x - player.x, dy = e.y - player.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < spec.aoeRadius) {
        damageEnemy(e, Math.floor(spec.aoeDmg * getElemDmgMult('earth')), 'earth');
        e.stunTimer = spec.stunDuration;
        // Earth eruption particles at enemy pos
        for (let j = 0; j < 8; j++) {
          spawnParticle(e.x, e.y, (Math.random()-0.5)*6, -Math.random()*8, '#ccaa44', 4+Math.random()*4, 25);
        }
      }
    }
    // Ground ripple effect
    zones.push({ x: player.x, y: player.y, radius: 0, maxRadius: spec.aoeRadius, color: ELEMENTS.earth.color, life: 30, maxLife: 30, type: 'ripple' });
  } else if (elem === 'air') {
    // Cyclone effect
    cycloneEffect = {
      x: player.x, y: player.y, radius: spec.aoeRadius, dmg: spec.aoeDmg,
      duration: spec.duration, life: spec.duration, pullForce: spec.pullForce,
    };
  }
}

function damageEnemy(e, dmg, element) {
  e.hp -= dmg;
  e.flashTimer = 8;
  hitstopFrames = Math.min(hitstopFrames + 2, 4);

  // Damage number
  addFloatingText(e.x + (Math.random()-0.5)*20, e.y - e.radius - 5, dmg.toString(), ELEMENTS[element].color, 30, 0.8);

  // Hit particles
  for (let i = 0; i < 4; i++) {
    spawnParticle(e.x, e.y, (Math.random()-0.5)*4, (Math.random()-0.5)*4, ELEMENTS[element].color, 2+Math.random()*3, 12+Math.random()*8);
  }

  // Special charge
  const chargeRate = 1 + getPerkBonus('specialRate');
  specialCharge = Math.min(100, specialCharge + (dmg * 0.15) * chargeRate);

  // Combo
  comboTimer = player.comboWindowBase * (1 + getPerkBonus('comboWindow'));
  combo++;
  comboMax = Math.max(comboMax, combo);

  if (e.hp <= 0 && e.alive) {
    killEnemy(e, element);
  }
}

function killEnemy(e, element) {
  e.alive = false;
  kills++;
  enemiesRemaining--;

  const def = ENEMY_TYPES[e.type];
  const comboMult = 1 + Math.min(combo * 0.1, 3);
  const pts = Math.floor(def.xp * comboMult * (e.elite ? 5 : 1));
  score += pts;

  // Vampiric healing
  const vampHeal = getPerkBonus('vampiric');
  if (vampHeal > 0) player.hp = Math.min(player.maxHp, player.hp + vampHeal);

  // Death explosion
  const particleCount = e.elite ? 30 : 15;
  for (let i = 0; i < particleCount; i++) {
    const a = Math.random() * PI2;
    const spd = 2 + Math.random() * 5;
    spawnParticle(e.x, e.y, Math.cos(a)*spd, Math.sin(a)*spd, e.color, 2+Math.random()*4, 20+Math.random()*15);
  }

  // Shockwave perk
  if (getPerkBonus('shockwave')) {
    for (const other of enemies) {
      if (other === e || !other.alive) continue;
      const dx = other.x - e.x, dy = other.y - e.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 80) {
        damageEnemy(other, 15, element);
        if (dist > 0) {
          other.vx = (dx/dist) * 4;
          other.vy = (dy/dist) * 4;
        }
      }
    }
    zones.push({ x: e.x, y: e.y, radius: 0, maxRadius: 80, color: '#ffaa00', life: 15, maxLife: 15, type: 'ripple' });
  }

  screenShake = Math.max(screenShake, e.elite ? 8 : 3);

  addKillFeed(def.name, element, e.elite);

  // Score popup
  if (pts > 30) addFloatingText(e.x, e.y - 20, '+' + pts, '#f59e0b', 35, 1.0);
}

function damagePlayer(dmg) {
  if (player.invincible > 0 || player.dashing || !player.alive) return;
  const reduction = getPerkBonus('dmgReduction');
  const actualDmg = Math.floor(dmg * (1 - reduction));
  player.hp -= actualDmg;
  player.invincible = 30;
  player.damageFlash = 15;
  screenShake = Math.max(screenShake, 6);

  // Red particles
  for (let i = 0; i < 8; i++) {
    spawnParticle(player.x, player.y, (Math.random()-0.5)*5, (Math.random()-0.5)*5, '#ff3333', 3, 15);
  }

  addFloatingText(player.x, player.y - 25, '-' + actualDmg, '#ff3333', 30, 1.0);

  if (player.hp <= 0) {
    player.hp = 0;
    player.alive = false;
    onPlayerDeath();
  }
}

function onPlayerDeath() {
  gameState = 'dead';
  document.body.classList.add('in-menu');
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('elemental_highscore', highScore.toString());
  }
  // Big death explosion
  for (let i = 0; i < 50; i++) {
    const a = Math.random() * PI2;
    const spd = 2 + Math.random() * 7;
    spawnParticle(player.x, player.y, Math.cos(a)*spd, Math.sin(a)*spd, ELEMENTS[player.element].color, 3+Math.random()*5, 30+Math.random()*20);
  }
  screenShake = 15;
  setTimeout(showDeathScreen, 800);
}

function showDeathScreen() {
  const statsEl = document.getElementById('death-stats');
  statsEl.innerHTML = `
    <div>Score: <span class="val">${score}</span></div>
    <div>Wave: <span class="val">${wave}</span></div>
    <div>Kills: <span class="val">${kills}</span></div>
    <div>Best Combo: <span class="val">x${comboMax}</span></div>
    ${score >= highScore ? '<div style="color:#f59e0b;margin-top:8px;">NEW HIGH SCORE!</div>' : `<div>High Score: <span class="val">${highScore}</span></div>`}
  `;
  document.getElementById('death-screen').style.display = 'flex';
}

// ============================================================
// ELEMENT SWITCHING & COMBOS
// ============================================================
function switchElement(newElem) {
  if (newElem === player.element) return;
  const prev = player.element;
  player.prevElement = prev;
  player.element = newElem;

  // Update UI
  document.querySelectorAll('.elem-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + newElem).classList.add('active');

  // Combo effect
  const comboKey = prev + '_' + newElem;
  const effect = COMBO_EFFECTS[comboKey];
  if (effect) {
    triggerComboEffect(effect);
  }

  // Aura burst particles
  const col = ELEMENTS[newElem].color;
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * PI2;
    spawnParticle(player.x, player.y, Math.cos(a)*3, Math.sin(a)*3, col, 2+Math.random()*2, 15);
  }
}

function triggerComboEffect(effect) {
  addFloatingText(player.x, player.y - 50, effect.name, effect.color, 45, 1.2);
  screenShake = Math.max(screenShake, 5);

  if (effect.type === 'aoe_slow') {
    // Damage + slow all enemies in radius
    for (const e of enemies) {
      if (!e.alive) continue;
      const dx = e.x - player.x, dy = e.y - player.y;
      if (Math.sqrt(dx*dx + dy*dy) < effect.radius) {
        damageEnemy(e, effect.dmg, player.element);
        e.slowTimer = effect.duration;
      }
    }
    zones.push({ x: player.x, y: player.y, radius: 0, maxRadius: effect.radius, color: effect.color, life: 30, maxLife: 30, type: 'ripple' });
  } else if (effect.type === 'aoe_burst') {
    // Instant damage burst
    for (const e of enemies) {
      if (!e.alive) continue;
      const dx = e.x - player.x, dy = e.y - player.y;
      if (Math.sqrt(dx*dx + dy*dy) < effect.radius) {
        damageEnemy(e, effect.dmg, player.element);
      }
    }
    // Ice shard particles
    for (let i = 0; i < 20; i++) {
      const a = Math.random() * PI2;
      spawnParticle(player.x, player.y, Math.cos(a)*(4+Math.random()*6), Math.sin(a)*(4+Math.random()*6), effect.color, 3+Math.random()*3, 20);
    }
    zones.push({ x: player.x, y: player.y, radius: 0, maxRadius: effect.radius, color: effect.color, life: 20, maxLife: 20, type: 'ripple' });
  } else if (effect.type === 'zone_dot') {
    zones.push({ x: player.x, y: player.y, radius: effect.radius, maxRadius: effect.radius, color: effect.color, life: effect.duration, maxLife: effect.duration, type: 'dot', dmg: effect.dmg, dmgTimer: 0 });
  } else if (effect.type === 'tornado') {
    zones.push({ x: player.x, y: player.y, radius: effect.radius, maxRadius: effect.radius, color: effect.color, life: effect.duration, maxLife: effect.duration, type: 'tornado', dmg: effect.dmg, dmgTimer: 0, angle: 0, moveAngle: Math.random() * PI2 });
  }

  // Combo particles
  for (let i = 0; i < 15; i++) {
    const a = Math.random() * PI2;
    const spd = 2 + Math.random() * 4;
    spawnParticle(player.x, player.y, Math.cos(a)*spd, Math.sin(a)*spd, effect.color, 2+Math.random()*3, 20+Math.random()*10);
  }
}

// ============================================================
// PARTICLES & EFFECTS
// ============================================================
function spawnParticle(x, y, vx, vy, color, size, life) {
  if (particles.length > 800) return; // Pool limit
  particles.push({ x, y, vx, vy, color, size, life, maxLife: life });
}

function addFloatingText(x, y, text, color, life, scale) {
  floatingTexts.push({ x, y, text, color, life, maxLife: life, scale: scale || 1, vy: -1.5 });
}

function addKillFeed(name, element, elite) {
  const color = ELEMENTS[element].color;
  const prefix = elite ? 'ELITE ' : '';
  killFeedMsgs.push({ text: `${prefix}${name}`, color, life: 180 });
  if (killFeedMsgs.length > 5) killFeedMsgs.shift();
}

// ============================================================
// INPUT HANDLING
// ============================================================
const keys = {};
let mouseX = 0, mouseY = 0, mouseDown = false;
let moveJoystick = null, aimJoystick = null;

// Keyboard
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key >= '1' && e.key <= '4') switchElement(ELEM_KEYS[parseInt(e.key) - 1]);
  if (e.key === ' ' || e.key === 'q') { e.preventDefault(); useSpecial(); }
  if (e.key === 'Shift' || e.key === 'e') tryDash();
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Mouse
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('mousedown', e => { mouseDown = true; });
canvas.addEventListener('mouseup', e => { mouseDown = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Touch joysticks — origin is where the finger first touches (not zone center)
let moveOrigin = null, aimOrigin = null;

const leftZone = document.getElementById('joystick-left');
const rightZone = document.getElementById('joystick-right');

leftZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  moveOrigin = { x: t.clientX, y: t.clientY, id: t.identifier };
  moveJoystick = { dx: 0, dy: 0, mag: 0, cx: t.clientX, cy: t.clientY, ox: t.clientX, oy: t.clientY, id: t.identifier };
}, { passive: false });

rightZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  aimOrigin = { x: t.clientX, y: t.clientY, id: t.identifier };
  aimJoystick = { dx: 0, dy: 0, mag: 0, cx: t.clientX, cy: t.clientY, ox: t.clientX, oy: t.clientY, id: t.identifier };
}, { passive: false });

function updateJoystickFromMove(origin, touch) {
  const dx = touch.clientX - origin.x;
  const dy = touch.clientY - origin.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const maxDist = 60;
  const norm = Math.min(dist, maxDist) / maxDist;
  return dist > 8 ? { dx: dx / Math.max(dist, 1), dy: dy / Math.max(dist, 1), mag: norm, cx: touch.clientX, cy: touch.clientY, ox: origin.x, oy: origin.y, id: touch.identifier } : { dx: 0, dy: 0, mag: 0, cx: touch.clientX, cy: touch.clientY, ox: origin.x, oy: origin.y, id: touch.identifier };
}

leftZone.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!moveOrigin) return;
  for (const t of e.changedTouches) {
    if (t.identifier === moveOrigin.id) moveJoystick = updateJoystickFromMove(moveOrigin, t);
  }
}, { passive: false });

rightZone.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!aimOrigin) return;
  for (const t of e.changedTouches) {
    if (t.identifier === aimOrigin.id) aimJoystick = updateJoystickFromMove(aimOrigin, t);
  }
}, { passive: false });

leftZone.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) { if (moveOrigin && moveOrigin.id === t.identifier) { moveJoystick = null; moveOrigin = null; } }
}, { passive: false });
rightZone.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) { if (aimOrigin && aimOrigin.id === t.identifier) { aimJoystick = null; aimOrigin = null; } }
}, { passive: false });

// Element buttons
document.querySelectorAll('.elem-btn').forEach(btn => {
  const handler = (e) => { e.preventDefault(); e.stopPropagation(); switchElement(btn.dataset.elem); };
  btn.addEventListener('click', handler);
  btn.addEventListener('touchstart', handler, { passive: false });
});

// Special button
const specialBtn = document.getElementById('btn-special');
specialBtn.addEventListener('click', e => { e.preventDefault(); useSpecial(); });
specialBtn.addEventListener('touchstart', e => { e.preventDefault(); useSpecial(); }, { passive: false });

// Dash button
const dashBtn = document.getElementById('btn-dash');
dashBtn.addEventListener('click', e => { e.preventDefault(); tryDash(); });
dashBtn.addEventListener('touchstart', e => { e.preventDefault(); tryDash(); }, { passive: false });

// Menu buttons
document.getElementById('btn-play').addEventListener('click', startGame);
document.getElementById('btn-retry').addEventListener('click', startGame);
document.getElementById('btn-menu-return').addEventListener('click', () => {
  document.getElementById('death-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  document.body.classList.add('in-menu');
  gameState = 'menu';
});

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('death-screen').style.display = 'none';
  document.body.classList.remove('in-menu');
  initGame();
  gameState = 'playing';
}

function tryDash() {
  if (player.dashCooldown > 0 || player.dashing || !player.alive) return;
  let dx = 0, dy = 0;
  if (moveJoystick) { dx = moveJoystick.dx; dy = moveJoystick.dy; }
  else {
    if (keys.w || keys.arrowup) dy -= 1;
    if (keys.s || keys.arrowdown) dy += 1;
    if (keys.a || keys.arrowleft) dx -= 1;
    if (keys.d || keys.arrowright) dx += 1;
  }
  if (dx === 0 && dy === 0) { dx = Math.cos(player.angle); dy = Math.sin(player.angle); }
  const len = Math.sqrt(dx * dx + dy * dy);
  player.dashAngle = Math.atan2(dy / len, dx / len);
  player.dashing = true;
  player.dashTimer = 10;
  player.dashCooldown = 60;
  player.invincible = 12;

  // Dash particles
  for (let i = 0; i < 10; i++) {
    spawnParticle(player.x, player.y, (Math.random()-0.5)*3, (Math.random()-0.5)*3, ELEMENTS[player.element].color, 2+Math.random()*2, 15);
  }
}

// ============================================================
// UPDATE LOOP
// ============================================================
function update() {
  if (gameState !== 'playing' && gameState !== 'waveIntro') return;
  if (hitstopFrames > 0) { hitstopFrames--; return; }

  updatePlayer();
  updateProjectiles();
  updateEnemies();
  updateEnemyProjectiles();
  updateParticles();
  updateZones();
  updateFloatingTexts();
  updateCyclone();
  updateSpawning();
  updateCombo();
  updateHUD();
  updateScreenShake();

  // Regen perk
  const regen = getPerkBonus('regen');
  if (regen > 0 && player.alive) {
    player.hp = Math.min(player.maxHp, player.hp + regen / 60);
  }

  // Check wave complete
  if (enemiesRemaining <= 0 && enemiesSpawned >= enemiesInWave && gameState === 'playing') {
    showPerkSelection();
  }
}

function updatePlayer() {
  if (!player.alive) return;
  const speedMult = 1 + getPerkBonus('moveSpeed');
  let dx = 0, dy = 0;

  // Movement input
  if (moveJoystick) {
    dx = moveJoystick.dx * moveJoystick.mag;
    dy = moveJoystick.dy * moveJoystick.mag;
  } else {
    if (keys.w || keys.arrowup) dy -= 1;
    if (keys.s || keys.arrowdown) dy += 1;
    if (keys.a || keys.arrowleft) dx -= 1;
    if (keys.d || keys.arrowright) dx += 1;
    if (dx !== 0 && dy !== 0) { const l = Math.sqrt(dx*dx+dy*dy); dx /= l; dy /= l; }
  }

  // Dash
  if (player.dashing) {
    player.x += Math.cos(player.dashAngle) * 12;
    player.y += Math.sin(player.dashAngle) * 12;
    player.dashTimer--;
    if (player.dashTimer <= 0) player.dashing = false;
    // Trail particles
    for (let i = 0; i < 3; i++) {
      spawnParticle(player.x + (Math.random()-0.5)*10, player.y + (Math.random()-0.5)*10,
        (Math.random()-0.5)*2, (Math.random()-0.5)*2, ELEMENTS[player.element].color, 2+Math.random()*2, 12);
    }
  } else {
    player.x += dx * player.speed * speedMult;
    player.y += dy * player.speed * speedMult;
  }

  // Aim
  if (aimJoystick) {
    player.angle = Math.atan2(aimJoystick.dy, aimJoystick.dx);
    player.firing = true;
  } else if (!isMobile) {
    const sx = player.x - camera.x + W / 2;
    const sy = player.y - camera.y + H / 2;
    player.angle = Math.atan2(mouseY - sy, mouseX - sx);
    player.firing = mouseDown;
  } else {
    player.firing = false;
  }

  // Fire
  if (player.firing && player.fireCooldown <= 0) fireProjectile();
  if (player.fireCooldown > 0) player.fireCooldown--;

  // Cooldowns
  if (player.dashCooldown > 0) player.dashCooldown--;
  if (player.invincible > 0) player.invincible--;
  if (player.damageFlash > 0) player.damageFlash--;

  // Arena boundary
  const distFromCenter = Math.sqrt(player.x * player.x + player.y * player.y);
  if (distFromCenter > ARENA_RADIUS - player.radius) {
    const a = Math.atan2(player.y, player.x);
    player.x = Math.cos(a) * (ARENA_RADIUS - player.radius);
    player.y = Math.sin(a) * (ARENA_RADIUS - player.radius);
  }

  // Obstacle collision
  for (const obs of arenaObstacles) {
    const odx = player.x - obs.x, ody = player.y - obs.y;
    const odist = Math.sqrt(odx * odx + ody * ody);
    const minDist = player.radius + obs.radius;
    if (odist < minDist && odist > 0) {
      player.x = obs.x + (odx / odist) * minDist;
      player.y = obs.y + (ody / odist) * minDist;
    }
  }

  // Shrine proximity buff (visual indicator done in render)
  player.auraPhase += 0.05;
}

function updateProjectiles() {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    // Trail particles
    if (p.trail && Math.random() < 0.6) {
      spawnParticle(p.x, p.y, (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5, p.color, p.radius * 0.5, 8);
    }

    // Check arena boundary
    const distC = Math.sqrt(p.x * p.x + p.y * p.y);
    if (distC > ARENA_RADIUS) { removeProjectile(i, p); continue; }

    // Hit obstacles
    let hitObs = false;
    for (const obs of arenaObstacles) {
      const dx = p.x - obs.x, dy = p.y - obs.y;
      if (Math.sqrt(dx * dx + dy * dy) < obs.radius + p.radius) {
        if (obs.type === 'pillar') { removeProjectile(i, p); hitObs = true; break; }
      }
    }
    if (hitObs) continue;

    // Hit enemies
    let hitEnemy = false;
    for (const e of enemies) {
      if (!e.alive || p.pierced.includes(e)) continue;
      const dx = p.x - e.x, dy = p.y - e.y;
      if (Math.sqrt(dx * dx + dy * dy) < e.radius + p.radius) {
        damageEnemy(e, p.dmg, p.element);
        // Knockback
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        e.vx += (dx / dist) * p.knockback;
        e.vy += (dy / dist) * p.knockback;

        p.pierced.push(e);
        if (p.pierced.length > p.pierce) {
          if (p.explosive) explodeProjectile(p);
          removeProjectile(i, p);
          hitEnemy = true;
          break;
        }
      }
    }
    if (hitEnemy) continue;

    if (p.life <= 0) {
      if (p.explosive) explodeProjectile(p);
      removeProjectile(i, p);
    }
  }
}

function removeProjectile(i, p) {
  // Impact particles
  for (let j = 0; j < 3; j++) {
    spawnParticle(p.x, p.y, (Math.random()-0.5)*3, (Math.random()-0.5)*3, p.color, 2, 10);
  }
  projectiles.splice(i, 1);
}

function explodeProjectile(p) {
  // AOE damage
  for (const e of enemies) {
    if (!e.alive) continue;
    const dx = e.x - p.x, dy = e.y - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < p.explosionR) {
      damageEnemy(e, Math.floor(p.dmg * 0.5), p.element);
      if (dist > 0) { e.vx += (dx/dist) * 3; e.vy += (dy/dist) * 3; }
    }
  }
  // Explosion particles
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * PI2;
    const spd = 2 + Math.random() * 4;
    spawnParticle(p.x, p.y, Math.cos(a)*spd, Math.sin(a)*spd, p.color, 3+Math.random()*3, 15+Math.random()*10);
  }
  // Explosion ring
  zones.push({ x: p.x, y: p.y, radius: 0, maxRadius: p.explosionR, color: p.color, life: 12, maxLife: 12, type: 'ripple' });
  screenShake = Math.max(screenShake, 4);
}

function updateEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    e.attackCooldown = Math.max(0, e.attackCooldown - 1);
    if (e.flashTimer > 0) e.flashTimer--;
    if (e.stunTimer > 0) { e.stunTimer--; e.vx *= 0.9; e.vy *= 0.9; continue; }

    const def = ENEMY_TYPES[e.type];
    const speedMult = e.slowTimer > 0 ? 0.4 : 1;
    if (e.slowTimer > 0) e.slowTimer--;

    const dx = player.x - e.x, dy = player.y - e.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const nx = dist > 0 ? dx / dist : 0;
    const ny = dist > 0 ? dy / dist : 0;

    if (def.behavior === 'chase' || def.behavior === 'stealth') {
      e.x += nx * e.speed * speedMult + e.vx;
      e.y += ny * e.speed * speedMult + e.vy;
      // Stealth
      if (def.behavior === 'stealth') {
        e.stealthAlpha = dist < def.revealRange ? Math.min(1, e.stealthAlpha + 0.05) : Math.max(0.05, e.stealthAlpha - 0.02);
      }
      // Melee attack
      if (dist < def.attackRange + player.radius && e.attackCooldown <= 0) {
        damagePlayer(e.dmg);
        e.attackCooldown = def.attackRate;
      }
    } else if (def.behavior === 'ranged') {
      // Keep distance
      if (dist > def.attackRange * 0.7) {
        e.x += nx * e.speed * speedMult + e.vx;
        e.y += ny * e.speed * speedMult + e.vy;
      } else if (dist < def.attackRange * 0.4) {
        e.x -= nx * e.speed * speedMult * 0.5;
        e.y -= ny * e.speed * speedMult * 0.5;
      }
      e.x += e.vx; e.y += e.vy;
      // Ranged attack
      if (dist < def.attackRange && e.attackCooldown <= 0) {
        const angle = Math.atan2(dy, dx) + (Math.random()-0.5)*0.15;
        enemyProjectiles.push({
          x: e.x, y: e.y,
          vx: -Math.cos(angle) * (def.projSpeed || 4),
          vy: -Math.sin(angle) * (def.projSpeed || 4),
          radius: def.projSize || 4, dmg: e.dmg, color: e.color, life: 80,
        });
        e.attackCooldown = def.attackRate;
      }
    } else if (def.behavior === 'charge') {
      if (!e.charging) {
        e.x += nx * e.speed * speedMult * 0.5 + e.vx;
        e.y += ny * e.speed * speedMult * 0.5 + e.vy;
        if (dist < (def.chargeRange || 200) && e.attackCooldown <= 0) {
          e.charging = true;
          e.chargeTimer = 30;
          e.chargeAngle = Math.atan2(dy, dx);
          // Charge windup particles
          for (let i = 0; i < 8; i++) {
            spawnParticle(e.x, e.y, (Math.random()-0.5)*2, (Math.random()-0.5)*2, e.color, 3, 20);
          }
        }
      } else {
        const cspd = (def.chargeSpeed || 5) * speedMult;
        e.x += Math.cos(e.chargeAngle) * cspd;
        e.y += Math.sin(e.chargeAngle) * cspd;
        e.chargeTimer--;
        // Charge trail
        if (Math.random() < 0.5) spawnParticle(e.x, e.y, (Math.random()-0.5)*2, (Math.random()-0.5)*2, e.color, 3, 10);
        if (e.chargeTimer <= 0) {
          e.charging = false;
          e.attackCooldown = def.attackRate;
        }
        // Hit player during charge
        if (dist < e.radius + player.radius) {
          damagePlayer(e.dmg * 1.5);
          e.charging = false;
          e.attackCooldown = def.attackRate;
        }
      }
    } else if (def.behavior === 'erratic') {
      e.phase += 0.1;
      const erraticX = Math.cos(e.phase) * 2;
      const erraticY = Math.sin(e.phase * 1.3) * 2;
      e.x += (nx * e.speed * 0.5 + erraticX) * speedMult + e.vx;
      e.y += (ny * e.speed * 0.5 + erraticY) * speedMult + e.vy;
      // Teleport
      if (Math.random() < (def.teleportChance || 0.005)) {
        const ta = Math.random() * PI2;
        const td = 80 + Math.random() * 80;
        // Teleport particles at old pos
        for (let i = 0; i < 8; i++) spawnParticle(e.x, e.y, (Math.random()-0.5)*4, (Math.random()-0.5)*4, e.color, 2, 15);
        e.x += Math.cos(ta) * td;
        e.y += Math.sin(ta) * td;
        // Particles at new pos
        for (let i = 0; i < 8; i++) spawnParticle(e.x, e.y, (Math.random()-0.5)*4, (Math.random()-0.5)*4, e.color, 2, 15);
      }
      if (dist < def.attackRange + player.radius && e.attackCooldown <= 0) {
        damagePlayer(e.dmg);
        e.attackCooldown = def.attackRate;
      }
    }

    // Velocity decay
    e.vx *= 0.85;
    e.vy *= 0.85;

    // Arena boundary for enemies
    const eDist = Math.sqrt(e.x * e.x + e.y * e.y);
    if (eDist > ARENA_RADIUS - e.radius) {
      const a = Math.atan2(e.y, e.x);
      e.x = Math.cos(a) * (ARENA_RADIUS - e.radius);
      e.y = Math.sin(a) * (ARENA_RADIUS - e.radius);
    }

    // Enemy-obstacle collision
    for (const obs of arenaObstacles) {
      const odx = e.x - obs.x, ody = e.y - obs.y;
      const odist = Math.sqrt(odx * odx + ody * ody);
      const minD = e.radius + obs.radius;
      if (odist < minD && odist > 0) {
        e.x = obs.x + (odx / odist) * minD;
        e.y = obs.y + (ody / odist) * minD;
      }
    }

    // Enemy-enemy separation
    for (const other of enemies) {
      if (other === e || !other.alive) continue;
      const sepDx = e.x - other.x, sepDy = e.y - other.y;
      const sepDist = Math.sqrt(sepDx * sepDx + sepDy * sepDy);
      const sepMin = e.radius + other.radius;
      if (sepDist < sepMin && sepDist > 0) {
        const push = (sepMin - sepDist) * 0.3;
        e.x += (sepDx / sepDist) * push;
        e.y += (sepDy / sepDist) * push;
      }
    }
  }

  // Remove dead enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (!enemies[i].alive) enemies.splice(i, 1);
  }
}

function updateEnemyProjectiles() {
  for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
    const p = enemyProjectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    // Trail
    if (Math.random() < 0.3) spawnParticle(p.x, p.y, 0, 0, p.color, 2, 8);

    // Hit player
    const dx = p.x - player.x, dy = p.y - player.y;
    if (Math.sqrt(dx * dx + dy * dy) < player.radius + p.radius && player.alive) {
      damagePlayer(p.dmg);
      // Impact particles
      for (let j = 0; j < 5; j++) spawnParticle(p.x, p.y, (Math.random()-0.5)*3, (Math.random()-0.5)*3, p.color, 2, 10);
      enemyProjectiles.splice(i, 1);
      continue;
    }

    // Hit obstacle
    let hit = false;
    for (const obs of arenaObstacles) {
      if (obs.type !== 'pillar') continue;
      const odx = p.x - obs.x, ody = p.y - obs.y;
      if (Math.sqrt(odx*odx + ody*ody) < obs.radius + p.radius) { hit = true; break; }
    }

    if (p.life <= 0 || hit) { enemyProjectiles.splice(i, 1); }
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life--;
    p.size *= 0.97;
    if (p.life <= 0 || p.size < 0.3) particles.splice(i, 1);
  }
}

function updateZones() {
  for (let i = zones.length - 1; i >= 0; i--) {
    const z = zones[i];
    z.life--;

    if (z.type === 'ripple') {
      z.radius += (z.maxRadius - z.radius) * 0.2;
    } else if (z.type === 'dot') {
      z.dmgTimer++;
      if (z.dmgTimer >= 20) {
        z.dmgTimer = 0;
        for (const e of enemies) {
          if (!e.alive) continue;
          const dx = e.x - z.x, dy = e.y - z.y;
          if (Math.sqrt(dx*dx + dy*dy) < z.radius) {
            damageEnemy(e, z.dmg, player.element);
          }
        }
      }
      // Zone particles
      if (Math.random() < 0.3) {
        const a = Math.random() * PI2;
        const r = Math.random() * z.radius;
        spawnParticle(z.x + Math.cos(a)*r, z.y + Math.sin(a)*r, 0, -Math.random()*2, z.color, 2+Math.random()*2, 10);
      }
    } else if (z.type === 'tornado') {
      z.angle += 0.15;
      z.x += Math.cos(z.moveAngle) * 1.5;
      z.y += Math.sin(z.moveAngle) * 1.5;
      z.moveAngle += (Math.random() - 0.5) * 0.1;
      z.dmgTimer++;
      if (z.dmgTimer >= 15) {
        z.dmgTimer = 0;
        for (const e of enemies) {
          if (!e.alive) continue;
          const dx = e.x - z.x, dy = e.y - z.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < z.radius) {
            damageEnemy(e, z.dmg, player.element);
            if (dist > 0) { e.vx -= (dx/dist)*2; e.vy -= (dy/dist)*2; }
          }
        }
      }
      // Tornado particles
      for (let j = 0; j < 2; j++) {
        const a = z.angle + j * Math.PI;
        const r = z.radius * (0.3 + Math.random() * 0.7);
        spawnParticle(z.x + Math.cos(a)*r, z.y + Math.sin(a)*r, Math.cos(a+Math.PI/2)*2, Math.sin(a+Math.PI/2)*2, z.color, 2+Math.random()*2, 12);
      }
    }

    if (z.life <= 0) zones.splice(i, 1);
  }
}

function updateCyclone() {
  if (!cycloneEffect) return;
  cycloneEffect.life--;
  if (cycloneEffect.life <= 0) { cycloneEffect = null; return; }

  // Pull and damage enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    const dx = cycloneEffect.x - e.x, dy = cycloneEffect.y - e.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < cycloneEffect.radius && dist > 0) {
      e.vx += (dx / dist) * cycloneEffect.pullForce;
      e.vy += (dy / dist) * cycloneEffect.pullForce;
      if (cycloneEffect.life % 10 === 0) {
        damageEnemy(e, cycloneEffect.dmg, 'air');
      }
    }
  }

  // Cyclone particles
  const phase = (cycloneEffect.life * 0.2);
  for (let i = 0; i < 3; i++) {
    const a = phase + (i / 3) * PI2;
    const r = cycloneEffect.radius * (0.3 + Math.sin(phase * 2 + i) * 0.3);
    spawnParticle(
      cycloneEffect.x + Math.cos(a) * r,
      cycloneEffect.y + Math.sin(a) * r,
      Math.cos(a + Math.PI/2) * 3, Math.sin(a + Math.PI/2) * 3,
      ELEMENTS.air.color, 2 + Math.random() * 3, 15
    );
  }
}

function updateFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const t = floatingTexts[i];
    t.y += t.vy;
    t.vy *= 0.95;
    t.life--;
    if (t.life <= 0) floatingTexts.splice(i, 1);
  }
}

function updateSpawning() {
  if (gameState !== 'playing') return;
  waveTimer++;
  const spawnRate = Math.max(15, 60 - wave * 3);
  if (waveTimer % spawnRate === 0 && enemiesSpawned < enemiesInWave) {
    spawnEnemy();
  }
}

function updateCombo() {
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) combo = 0;
  }
}

function updateScreenShake() {
  screenShake *= screenShakeDecay;
  if (screenShake < 0.1) screenShake = 0;
}

function updateHUD() {
  document.getElementById('score-display').textContent = score.toLocaleString();
  document.getElementById('wave-display').textContent = 'WAVE ' + wave;
  const hpPct = Math.max(0, player.hp / player.maxHp * 100);
  const hpBar = document.getElementById('hp-bar');
  hpBar.style.width = hpPct + '%';
  hpBar.style.background = hpPct > 50 ? 'linear-gradient(90deg, #4f4, #2d2)' : hpPct > 25 ? 'linear-gradient(90deg, #ff4, #fa0)' : 'linear-gradient(90deg, #f44, #a00)';
  document.getElementById('hp-text').textContent = Math.ceil(player.hp) + ' / ' + player.maxHp;

  // Special bar
  document.getElementById('special-bar').style.width = specialCharge + '%';
  const specBtn = document.getElementById('btn-special');
  if (specialCharge >= 100) { specBtn.classList.add('ready'); specBtn.textContent = SPECIALS[player.element].name.substring(0, 4).toUpperCase(); }
  else { specBtn.classList.remove('ready'); specBtn.textContent = Math.floor(specialCharge) + '%'; }

  // Combo display
  const comboEl = document.getElementById('combo-display');
  if (combo >= 2) { comboEl.textContent = 'COMBO x' + combo; comboEl.classList.add('active'); }
  else { comboEl.classList.remove('active'); }

  // Dash button
  const dashBtnEl = document.getElementById('btn-dash');
  if (player.dashCooldown > 0) { dashBtnEl.classList.add('cooldown'); dashBtnEl.textContent = Math.ceil(player.dashCooldown / 60 * 10) / 10 + 's'; }
  else { dashBtnEl.classList.remove('cooldown'); dashBtnEl.textContent = 'DASH'; }

  // Kill feed
  const feedEl = document.getElementById('kill-feed');
  feedEl.innerHTML = '';
  for (const msg of killFeedMsgs) {
    const div = document.createElement('div');
    div.className = 'kill-msg';
    div.style.color = msg.color;
    div.style.opacity = Math.min(1, msg.life / 30);
    div.textContent = msg.text;
    feedEl.appendChild(div);
    msg.life--;
  }
  killFeedMsgs = killFeedMsgs.filter(m => m.life > 0);
}

// ============================================================
// RENDERING
// ============================================================
function render() {
  ctx.clearRect(0, 0, W, H);

  // Camera follow player
  const camTarget = { x: player.x, y: player.y };
  camera.x += (camTarget.x - camera.x) * 0.08;
  camera.y += (camTarget.y - camera.y) * 0.08;

  ctx.save();
  // Screen shake
  const shakeX = (Math.random() - 0.5) * screenShake * 2;
  const shakeY = (Math.random() - 0.5) * screenShake * 2;
  ctx.translate(W / 2 - camera.x + shakeX, H / 2 - camera.y + shakeY);

  drawArena();
  drawZones();
  drawProjectiles();
  drawEnemyProjectiles();
  drawEnemies();
  drawPlayer();
  drawParticles();
  drawFloatingTexts();
  drawCyclone();

  ctx.restore();

  // Vignette overlay
  drawVignette();

  // Joystick visuals
  if (isMobile) drawJoysticks();
}

function drawArena() {
  // Arena floor - subtle grid
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const gridSize = 80;
  const startX = Math.floor((camera.x - W/2) / gridSize) * gridSize;
  const startY = Math.floor((camera.y - H/2) / gridSize) * gridSize;
  const endX = camera.x + W/2;
  const endY = camera.y + H/2;
  for (let x = startX; x <= endX; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, camera.y - H); ctx.lineTo(x, camera.y + H); ctx.stroke();
  }
  for (let y = startY; y <= endY; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(camera.x - W, y); ctx.lineTo(camera.x + W, y); ctx.stroke();
  }

  // Arena boundary circle
  ctx.beginPath();
  ctx.arc(0, 0, ARENA_RADIUS, 0, PI2);
  ctx.strokeStyle = 'rgba(255,100,100,0.15)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Boundary glow
  ctx.beginPath();
  ctx.arc(0, 0, ARENA_RADIUS, 0, PI2);
  ctx.strokeStyle = 'rgba(255,100,100,0.05)';
  ctx.lineWidth = 15;
  ctx.stroke();
  ctx.restore();

  // Obstacles
  for (const obs of arenaObstacles) {
    if (obs.type === 'pillar') {
      ctx.beginPath();
      ctx.arc(obs.x, obs.y, obs.radius, 0, PI2);
      ctx.fillStyle = '#1a1a22';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 2;
      ctx.stroke();
    } else if (obs.type === 'shrine') {
      const elem = ELEMENTS[obs.element];
      const glow = Math.sin(Date.now() * 0.003) * 0.3 + 0.7;
      // Shrine glow
      const grad = ctx.createRadialGradient(obs.x, obs.y, 0, obs.x, obs.y, obs.radius * 2.5);
      grad.addColorStop(0, elem.color + '33');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(obs.x, obs.y, obs.radius * 2.5, 0, PI2);
      ctx.fill();
      // Shrine body
      ctx.beginPath();
      ctx.arc(obs.x, obs.y, obs.radius, 0, PI2);
      ctx.fillStyle = '#111118';
      ctx.fill();
      ctx.strokeStyle = elem.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = glow;
      ctx.stroke();
      ctx.globalAlpha = 1;
      // Inner symbol
      ctx.fillStyle = elem.color;
      ctx.globalAlpha = glow * 0.8;
      ctx.beginPath();
      ctx.arc(obs.x, obs.y, 6, 0, PI2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function drawPlayer() {
  if (!player.alive) return;
  const elem = ELEMENTS[player.element];

  ctx.save();

  // Player glow
  const glowGrad = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, 60);
  glowGrad.addColorStop(0, elem.color + '22');
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.arc(player.x, player.y, 60, 0, PI2);
  ctx.fill();

  // Aura ring
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.auraPhase);
  ctx.beginPath();
  ctx.arc(0, 0, player.radius + 6, 0, PI2);
  ctx.strokeStyle = elem.color + '44';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 12]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Player body
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius, 0, PI2);
  const bodyGrad = ctx.createRadialGradient(player.x - 3, player.y - 3, 0, player.x, player.y, player.radius);
  bodyGrad.addColorStop(0, '#eee');
  bodyGrad.addColorStop(0.7, '#aaa');
  bodyGrad.addColorStop(1, '#666');
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // Element color ring on body
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius, 0, PI2);
  ctx.strokeStyle = elem.color;
  ctx.lineWidth = 3;
  ctx.stroke();

  // Damage flash
  if (player.damageFlash > 0) {
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, PI2);
    ctx.fillStyle = 'rgba(255,50,50,' + (player.damageFlash / 15 * 0.6) + ')';
    ctx.fill();
  }

  // Invincibility flash
  if (player.invincible > 0 && player.invincible % 4 < 2) {
    ctx.globalAlpha = 0.5;
  }

  // Direction indicator (small triangle)
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);
  ctx.beginPath();
  ctx.moveTo(player.radius + 8, 0);
  ctx.lineTo(player.radius + 1, -5);
  ctx.lineTo(player.radius + 1, 5);
  ctx.closePath();
  ctx.fillStyle = elem.color;
  ctx.fill();
  ctx.restore();

  // Dash trail
  if (player.dashing) {
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius + 10, 0, PI2);
    ctx.fillStyle = elem.color + '33';
    ctx.fill();
  }

  ctx.restore();
}

function drawEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;

    ctx.save();
    ctx.globalAlpha = e.stealthAlpha !== undefined ? e.stealthAlpha : 1;

    // Enemy glow
    if (e.elite) {
      const gGrad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius * 3);
      gGrad.addColorStop(0, e.color + '33');
      gGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = gGrad;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius * 3, 0, PI2);
      ctx.fill();
    }

    // Body
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius, 0, PI2);

    if (e.flashTimer > 0) {
      ctx.fillStyle = '#fff';
    } else if (e.stunTimer > 0) {
      ctx.fillStyle = '#ffff44';
    } else {
      const bGrad = ctx.createRadialGradient(e.x - e.radius*0.3, e.y - e.radius*0.3, 0, e.x, e.y, e.radius);
      bGrad.addColorStop(0, e.color);
      bGrad.addColorStop(1, shadeColor(e.color, -40));
      ctx.fillStyle = bGrad;
    }
    ctx.fill();

    // Outline
    ctx.strokeStyle = e.elite ? '#ffdd00' : 'rgba(0,0,0,0.4)';
    ctx.lineWidth = e.elite ? 3 : 1.5;
    ctx.stroke();

    // Eyes (two dots facing player)
    const eyeAngle = Math.atan2(player.y - e.y, player.x - e.x);
    const eyeDist = e.radius * 0.4;
    const eyeSize = e.radius * 0.2;
    for (let side = -1; side <= 1; side += 2) {
      const ex = e.x + Math.cos(eyeAngle + side * 0.4) * eyeDist;
      const ey = e.y + Math.sin(eyeAngle + side * 0.4) * eyeDist;
      ctx.beginPath();
      ctx.arc(ex, ey, eyeSize, 0, PI2);
      ctx.fillStyle = e.flashTimer > 0 ? '#f00' : '#111';
      ctx.fill();
    }

    // HP bar (for enemies that have taken damage)
    if (e.hp < e.maxHp) {
      const barW = e.radius * 2;
      const barH = 3;
      const barX = e.x - barW / 2;
      const barY = e.y - e.radius - 8;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = e.hp / e.maxHp > 0.5 ? '#4f4' : e.hp / e.maxHp > 0.25 ? '#fa0' : '#f44';
      ctx.fillRect(barX, barY, barW * (e.hp / e.maxHp), barH);
    }

    // Stun indicator
    if (e.stunTimer > 0) {
      const starPhase = Date.now() * 0.01;
      for (let s = 0; s < 3; s++) {
        const sa = starPhase + (s / 3) * PI2;
        const sx = e.x + Math.cos(sa) * (e.radius + 5);
        const sy = e.y - e.radius - 5 + Math.sin(sa * 2) * 3;
        ctx.fillStyle = '#ffff44';
        ctx.font = '8px sans-serif';
        ctx.fillText('\u2605', sx, sy);
      }
    }

    // Charge indicator
    if (e.charging) {
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius + 5, 0, PI2);
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.restore();
  }
}

function drawProjectiles() {
  for (const p of projectiles) {
    ctx.save();
    // Glow
    const gGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 3);
    gGrad.addColorStop(0, p.color + '66');
    gGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = gGrad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * 3, 0, PI2);
    ctx.fill();

    // Projectile body
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, PI2);
    ctx.fillStyle = p.color;
    ctx.fill();
    // Bright center
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * 0.4, 0, PI2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.restore();
  }
}

function drawEnemyProjectiles() {
  for (const p of enemyProjectiles) {
    ctx.save();
    const gGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 2.5);
    gGrad.addColorStop(0, p.color + '88');
    gGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = gGrad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * 2.5, 0, PI2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, PI2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, PI2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawZones() {
  for (const z of zones) {
    const alpha = z.life / z.maxLife;
    ctx.save();
    if (z.type === 'ripple') {
      ctx.beginPath();
      ctx.arc(z.x, z.y, z.radius, 0, PI2);
      ctx.strokeStyle = z.color;
      ctx.lineWidth = 3 * alpha;
      ctx.globalAlpha = alpha * 0.6;
      ctx.stroke();
    } else if (z.type === 'dot') {
      ctx.beginPath();
      ctx.arc(z.x, z.y, z.radius, 0, PI2);
      ctx.fillStyle = z.color + Math.floor(alpha * 30).toString(16).padStart(2, '0');
      ctx.fill();
      ctx.strokeStyle = z.color;
      ctx.lineWidth = 1;
      ctx.globalAlpha = alpha * 0.4;
      ctx.stroke();
    } else if (z.type === 'tornado') {
      ctx.globalAlpha = alpha * 0.3;
      ctx.beginPath();
      ctx.arc(z.x, z.y, z.radius, 0, PI2);
      ctx.fillStyle = z.color;
      ctx.fill();
      // Spinning lines
      ctx.globalAlpha = alpha * 0.5;
      for (let i = 0; i < 4; i++) {
        const a = z.angle + (i / 4) * PI2;
        ctx.beginPath();
        ctx.moveTo(z.x, z.y);
        ctx.lineTo(z.x + Math.cos(a) * z.radius, z.y + Math.sin(a) * z.radius);
        ctx.strokeStyle = z.color;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }
    ctx.restore();
  }
}

function drawCyclone() {
  if (!cycloneEffect) return;
  const alpha = cycloneEffect.life / cycloneEffect.duration;
  ctx.save();
  ctx.globalAlpha = alpha * 0.2;
  ctx.beginPath();
  ctx.arc(cycloneEffect.x, cycloneEffect.y, cycloneEffect.radius, 0, PI2);
  ctx.fillStyle = ELEMENTS.air.color;
  ctx.fill();

  // Spiral lines
  ctx.globalAlpha = alpha * 0.5;
  const phase = Date.now() * 0.005;
  for (let i = 0; i < 6; i++) {
    const a = phase + (i / 6) * PI2;
    ctx.beginPath();
    ctx.arc(cycloneEffect.x, cycloneEffect.y, cycloneEffect.radius * (0.3 + i * 0.1), a, a + 1);
    ctx.strokeStyle = ELEMENTS.air.color;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.restore();
}

function drawFloatingTexts() {
  for (const t of floatingTexts) {
    const alpha = t.life / t.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `${Math.round(14 * t.scale)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fontWeight = '700';
    ctx.fillStyle = t.color;
    ctx.textAlign = 'center';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 4;
    ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
  }
}

function drawVignette() {
  const grad = ctx.createRadialGradient(W/2, H/2, W * 0.3, W/2, H/2, W * 0.7);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Damage vignette
  if (player.damageFlash > 0) {
    const dGrad = ctx.createRadialGradient(W/2, H/2, W * 0.2, W/2, H/2, W * 0.6);
    dGrad.addColorStop(0, 'transparent');
    dGrad.addColorStop(1, 'rgba(255,0,0,' + (player.damageFlash / 15 * 0.3) + ')');
    ctx.fillStyle = dGrad;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawJoysticks() {
  // Move joystick
  if (moveJoystick) {
    ctx.save();
    ctx.globalAlpha = 0.3;
    // Base circle
    ctx.beginPath();
    ctx.arc(moveJoystick.ox, moveJoystick.oy, 50, 0, PI2);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Stick
    ctx.beginPath();
    const stickX = moveJoystick.ox + moveJoystick.dx * moveJoystick.mag * 40;
    const stickY = moveJoystick.oy + moveJoystick.dy * moveJoystick.mag * 40;
    ctx.arc(stickX, stickY, 18, 0, PI2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();
    ctx.restore();
  }

  // Aim joystick
  if (aimJoystick) {
    ctx.save();
    ctx.globalAlpha = 0.3;
    const elem = ELEMENTS[player.element];
    ctx.beginPath();
    ctx.arc(aimJoystick.ox, aimJoystick.oy, 50, 0, PI2);
    ctx.strokeStyle = elem.color;
    ctx.lineWidth = 2;
    ctx.stroke();
    const stickX = aimJoystick.ox + aimJoystick.dx * aimJoystick.mag * 40;
    const stickY = aimJoystick.oy + aimJoystick.dy * aimJoystick.mag * 40;
    ctx.beginPath();
    ctx.arc(stickX, stickY, 18, 0, PI2);
    ctx.fillStyle = elem.color + '88';
    ctx.fill();
    ctx.restore();
  }
}

// ============================================================
// UTILITY
// ============================================================
function shadeColor(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16) + amt;
  let g = parseInt(hex.slice(3, 5), 16) + amt;
  let b = parseInt(hex.slice(5, 7), 16) + amt;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
let lastTime = 0;
const TICK = 1000 / 60;
let accumulator = 0;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  accumulator += dt;

  // Fixed timestep updates
  while (accumulator >= TICK) {
    update();
    accumulator -= TICK;
  }

  render();
}

// Show high score on title
if (highScore > 0) {
  document.getElementById('highscore-display').style.display = 'block';
  document.getElementById('highscore-display').textContent = 'HIGH SCORE: ' + highScore.toLocaleString();
}

// Title screen particles
let titleParticles = [];
function titleLoop(timestamp) {
  if (gameState !== 'menu') return requestAnimationFrame(titleLoop);
  requestAnimationFrame(titleLoop);

  ctx.clearRect(0, 0, W, H);

  // Spawn elemental particles around center
  if (Math.random() < 0.3) {
    const elem = ELEM_KEYS[Math.floor(Math.random() * 4)];
    const col = ELEMENTS[elem].color;
    const a = Math.random() * PI2;
    const r = 100 + Math.random() * 200;
    titleParticles.push({
      x: W/2 + Math.cos(a) * r,
      y: H/2 + Math.sin(a) * r - 50,
      vx: Math.cos(a + Math.PI/2) * (1 + Math.random()),
      vy: Math.sin(a + Math.PI/2) * (1 + Math.random()) - 0.5,
      color: col, size: 2 + Math.random() * 4, life: 60 + Math.random() * 40,
      maxLife: 100,
    });
  }

  for (let i = titleParticles.length - 1; i >= 0; i--) {
    const p = titleParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    p.size *= 0.99;
    if (p.life <= 0) { titleParticles.splice(i, 1); continue; }
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha * 0.7;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, PI2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Vignette
  const grad = ctx.createRadialGradient(W/2, H/2, W * 0.2, W/2, H/2, W * 0.7);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// Start appropriate loop
requestAnimationFrame(titleLoop);
requestAnimationFrame(gameLoop);
</script>
